ntsc: |
  NTSC frame rate: 30000/1001 ≈ 29.97 fps. Used in North American and Japanese broadcast television.
pal: |
  PAL frame rate: 25 fps. Used in European, Chinese, and other broadcast television systems.
qntsc: |
  Quarter NTSC frame rate: 30000/1001 ≈ 29.97 fps at quarter resolution.
qpal: |
  Quarter PAL frame rate: 25 fps at quarter resolution.
sntsc: |
  Squared NTSC frame rate: 30000/1001 ≈ 29.97 fps with square pixel aspect ratio.
spal: |
  Squared PAL frame rate: 25 fps with square pixel aspect ratio.
film: |
  Film frame rate: 24 fps. Standard cinema frame rate (exactly 24/1).
ntsc-film: |
  NTSC film frame rate: 24000/1001 ≈ 23.976 fps. Used for 24 fps film transferred to NTSC.
