sol: |
  Sierra SOL. Game audio from Sierra On-Line. Demuxing only. Classic Sierra game content.
spx: |
  Ogg Speex. Speex speech codec in Ogg container. Muxing only. Open-source speech codec from Xiph.org. Largely superseded by Opus.
ssegment: |
  Streaming segment muxer. Splits output into timed segments. Muxing only. For live adaptive streaming.
stl: |
  Spruce subtitle format. Text subtitle format for DVD authoring. Demuxing only.
stream_segment: |
  Streaming segment muxer (alias). Muxing only. Timed segment splitting for adaptive streaming.
streamhash: |
  Per-stream SHA-256 hash testing. Pseudo-muxer. Muxing only. For per-stream verification.
subviewer: |
  SubViewer subtitle format. Text subtitles with metadata. Demuxing only. Found in some DivX files.
subviewer1: |
  SubViewer v1 subtitle format. Earlier SubViewer variant. Demuxing only.
sunrast_pipe: |
  Piped Sun Rasterfile image sequence. Solaris/Unix frames. Demuxing only.
svag: |
  Konami PS2 SVAG. Game audio from Konami PS2 titles. Demuxing only.
svcd: |
  MPEG-2 PS (SVCD). Super Video CD program stream. Muxing only. Enhanced VCD with MPEG-2 video at ~2.6 Mbit/s. Popular in Asia for video distribution.
svg_pipe: |
  Piped SVG image sequence. W3C vector graphics rendered as frames. Demuxing only. Librsvg-based rendering.
svs: |
  Square SVS. Game audio from Square Enix. Demuxing only.
tak: |
  Raw TAK (Tom's lossless Audio Kompressor). Lossless audio. Demuxing only. Compression between FLAC and APE. Popular in Asian audiophile communities.
tedcaptions: |
  TED Talks captions. JSON-based subtitle format from TED Talks. Demuxing only.
tee: |
  Multiple muxer tee. Duplicates output to multiple muxers simultaneously. Muxing only. For parallel output to different formats.
thp: |
  THP. Nintendo GameCube/Wii game video with ADPCM audio. Demuxing only. Used in Wii game cutscenes.
tiertexseq: |
  Tiertex Limited SEQ. Game video from Tiertex. Demuxing only.
tiff_pipe: |
  Piped TIFF image sequence. Tagged Image File Format frames. Demuxing only. Scientific and VFX imaging.
tmv: |
  8088flex TMV. Video format for 8088 CPU DOS systems. Demuxing only. Extremely low-resolution retro format.
ttml: |
  TTML (Timed Text Markup Language). W3C XML subtitle format. Muxing only. Used in broadcast (EBU-TT-D) and streaming (IMSC1).
tty: |
  Tele-typewriter. Text/subtitle data from teletext sources. Demuxing only.
txd: |
  Renderware TeXture Dictionary. Game texture container for Renderware engine. Demuxing only. Found in GTA and similar games.
ty: |
  TiVo TY Stream. TiVo DVR recording format. Demuxing only. Used for extracting video from TiVo devices.
uncodedframecrc: |
  Uncoded frame CRC testing. Pseudo-muxer for raw frame verification. Muxing only.
usm: |
  CRI USM. CRI Middleware's game video container. Demuxing only. Used in Japanese game cutscenes (Yakuza, Persona series).
v210: |
  Uncompressed 4:2:2 10-bit. Professional Broadcast video format. Demuxing only. SDI video I/O.
v210x: |
  Uncompressed 4:2:2 10-bit variant. Broadcast video. Demuxing only.
vag: |
  Sony PS2 VAG. PlayStation 2 audio format. Demuxing only. PS2 game audio.
vapoursynth: |
  VapourSynth script. Frameserve video from VapourSynth scripts. Demuxing only. Python-based video processing.
vbn_pipe: |
  Piped VBN (Vizrt Binary) image sequence. Broadcast graphics frames. Demuxing only. Vizrt systems.
vcd: |
  MPEG-1 Systems (VCD). Video CD program stream at ~1.15 Mbit/s. Muxing only. Standard for VCD authoring. VHS-quality on CD-ROM.
vividas: |
  Vividas VIV. Streaming video container. Demuxing only.
vivo: |
  Vivo. Early internet streaming video format. Demuxing only. Legacy web video from the 1990s.
vmd: |
  Sierra VMD. Game video from Sierra On-Line. Demuxing only. Classic Sierra adventure games.
vob: |
  MPEG-2 PS (VOB). DVD-Video Object container at up to 9.8 Mbit/s. Muxing only. DVD-Video authoring with MPEG-2 video and AC-3/DTS audio.
vobsub: |
  VobSub subtitle format. DVD bitmap subtitles extracted from VOB. Demuxing only. Paired with .idx index files.
vpk: |
  Sony PS2 VPK. PlayStation 2 audio format. Demuxing only. PS2 game audio.
vplayer: |
  VPlayer subtitles. Text subtitle format. Demuxing only.
vqf: |
  NTT TwinVQ. Yamaha's audio format for low-bitrate compression. Demuxing only. Used in some Japanese portable audio players.
wady: |
  Marble WADY. Game audio format. Demuxing only.
wavarc: |
  Waveform Archiver. Compressed audio format. Demuxing only. Rare format.
wc3movie: |
  Wing Commander III movie. Origin Systems' game video. Demuxing only. Wing Commander III cutscenes.
webm: |
  WebM. Google's subset of Matroska for web video, supporting VP8/VP9 video and Vorbis/Opus audio.
  Optimized for HTML5 video delivery. Muxing name: `webm`.
webm_chunk: |
  WebM Chunk Muxer. Splits WebM into chunks for DASH/HLS segmenting. Muxing only. Creates fragmented WebM for adaptive streaming.
webp: |
  WebP. Google's image format based on VP8. Muxing only. Better compression than JPEG/PNG. Supports lossy, lossless, alpha, animation.
webp_pipe: |
  Piped WebP image sequence. Google WebP frames. Demuxing only.
whip: |
  WHIP (WebRTC-HTTP ingestion protocol). WebRTC streaming output. Muxing only. Standard for browser-based live streaming.
wsd: |
  WSD (Wideband Single-bit Data). Professional broadcast audio format. Demuxing only.
wsvqa: |
  Westwood Studios VQA. Vector Quantized Animation for C&C cutscenes. Demuxing only. Command & Conquer, Red Alert.
wve: |
  Psion 3 audio. Audio from Psion Series 3 PDA. Demuxing only. Legacy handheld audio.
x11grab: |
  X11 screen capture. Linux X11/XCB desktop recording. Demuxing only. Screen recording on X11-based desktops.
xa: |
  Maxis XA. Audio from Maxis games (SimCity, The Sims). Demuxing only.
xbin: |
  eXtended BINary text (XBIN). Enhanced ANSI/ASCII art format. Demuxing only. Demoscene and BBS art.
xbm_pipe: |
  Piped XBM image sequence. X11 BitMap frames. Demuxing only.
xmd: |
  Konami XMD. Game audio from Konami. Demuxing only.
xmv: |
  Microsoft XMV. Xbox game video container. Demuxing only. Original Xbox titles.
xpm_pipe: |
  Piped XPM image sequence. X11 PixMap frames. Demuxing only.
xvag: |
  Sony PS3 XVAG. PlayStation 3 audio. Demuxing only. PS3 game audio.
xwd_pipe: |
  Piped XWD image sequence. X Window Dump screen capture frames. Demuxing only.
xwma: |
  Microsoft xWMA. Compressed audio for XNA/Xbox games. Demuxing only. Used in some Xbox 360 game titles.
yop: |
  Psygnosis YOP. Game video from Psygnosis. Demuxing only. Found in Lemmings and similar titles.
