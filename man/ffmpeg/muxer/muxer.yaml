"3g2": |
  3GP2 (3GPP2). Multimedia container for 3GPP2 (CDMA) mobile phones.
  Similar to 3GP but for CDMA2000 networks. Muxing name: `3g2`.
"3gp": |
  3GP (3GPP). Multimedia container for 3G mobile phones.
  Subset of MP4 with H.263/AMR-NB. Muxing name: `3gp`.
a64: |
  Commodore 64 video. Extremely low-res character graphics for C64 retro computing.
ac3: |
  Raw AC-3 muxer. Wraps Dolby Digital audio in raw AC-3 format.
  Output only — no container, just the AC-3 bitstream.
ac4: |
  raw AC-4.
adts: |
  ADTS (Audio Data Transport Stream) muxer. Wraps AAC in ADTS frames.
  Used for streaming AAC audio without a container. Each packet is self-contained.
adx: |
  CRI ADX.
aea: |
  MD STUDIO audio.
aiff: |
  Audio IFF muxer. Apple's audio container (big-endian WAV equivalent).
  Supports AIFF-C compressed variants and metadata.
alaw: |
  PCM A-law.
alp: |
  LEGO Racers ALP.
amr: |
  3GPP AMR.
amv: |
  AMV (Action Media Video). Low-quality video for cheap portable media players. Muxing only. Heavily downsampled, low bitrate.
apm: |
  Ubisoft Rayman 2 APM.
apng: |
  APNG muxer. Animated PNG with full color and transparency support.
  Better quality than GIF. No audio support.
aptx: |
  raw aptX (Audio Processing Technology for Bluetooth).
aptx_hd: |
  raw aptX HD (Audio Processing Technology for Bluetooth).
apv: |
  APV raw bitstream.
argo_asf: |
  Argonaut Games ASF.
argo_cvg: |
  Argonaut Games CVG.
asf: |
  ASF (Advanced Streaming Format) muxer. Microsoft container for WMV/WMA.
  Supports DV DVR-MS extensions. Legacy format.
asf_stream: |
  ASF (Advanced Streaming Format). Microsoft streaming container. Muxing only. Used with Windows Media streaming and Silverlight.
ass: |
  SSA (SubStation Alpha) subtitle.
ast: |
  AST (Audio Stream).
au: |
  Sun AU.
avi: |
  AVI (Audio Video Interleaved) muxer. Microsoft legacy container format.
  Wide playback compatibility but limited features. Subject to 2 GB file size limit.
avif: |
  AVIF (AV1 Image File Format). Modern image using AV1 compression. Muxing only. Better compression than JPEG, supports HDR and wide gamut.
avm2: |
  SWF AVM2. Adobe Flash with ActionScript 3. Muxing only. Legacy web multimedia format.
avs2: |
  raw AVS2-P2/IEEE1857.4 video.
avs3: |
  AVS3-P2/IEEE1857.10.
bit: |
  G.729 BIT file format.
caf: |
  Apple CAF muxer. Core Audio Format supporting many codecs and large files.
  No 4 GB file size limit of WAV/AIFF. Modern Apple audio container.
cavsvideo: |
  raw Chinese AVS (Audio Video Standard) video.
codec2: |
  codec2 .c2 muxer.
codec2raw: |
  raw codec2 muxer.
crc: |
  CRC testing muxer. Computes CRC of encoded packets for regression testing.
  No actual output file — used for verification only.
dash: |
  DASH (Dynamic Adaptive Streaming over HTTP) muxer. ISO adaptive streaming.
  Creates MPD manifest and segments. Options: `seg_duration`, `window_size`.
data: |
  raw data.
daud: |
  D-Cinema audio.
dfpwm: |
  raw DFPWM1a.
dirac: |
  raw Dirac.
dnxhd: |
  raw DNxHD (SMPTE VC-3).
dts: |
  raw DTS.
dv: |
  DV (Digital Video).
dvd: |
  DVD-VOB muxer. MPEG-2 Program Stream for DVD-Video authoring.
  Creates VOB-compatible output. Requires MPEG-2 video and AC-3/PCM audio.
eac3: |
  Raw E-AC-3 muxer. Wraps Dolby Digital Plus audio.
  Enhanced AC-3 bitstream output without container overhead.
evc: |
  raw EVC video.
f32be: |
  PCM 32-bit floating-point big-endian.
f32le: |
  PCM 32-bit floating-point little-endian.
f4v: |
  F4V (Adobe Flash Video). MP4 variant for Flash video delivery. Muxing only. Largely obsolete since Flash deprecation.
f64be: |
  PCM 64-bit floating-point big-endian.
f64le: |
  PCM 64-bit floating-point little-endian.
ffmetadata: |
  FFmpeg metadata muxer. Writes stream/frame metadata in text format.
  Used for injecting or exporting metadata.
fifo: |
  FIFO queue pseudo-muxer. Buffers packets to handle encoder stalls and timestamp issues.
  Useful for live streaming where encoder may pause.
film_cpk: |
  Sega FILM / CPK.
filmstrip: |
  Adobe Filmstrip.
fits: |
  Flexible Image Transport System.
flac: |
  Raw FLAC muxer. Writes FLAC audio with metadata support.
  Supports Vorbis comments, cover art, and seeking.
flv: |
  FLV (Flash Video) muxer. Adobe Flash container, still used for RTMP streaming.
  Supports H.264/AAC or VP6/MP3. Legacy but required for some live platforms.
framecrc: |
  Frame CRC muxer. Computes per-frame CRC of encoded output.
  No actual output file — used for regression testing.
framehash: |
  Per-frame SHA-256 hash testing. Pseudo-muxer for A/V verification.
framemd5: |
  Per-frame MD5 testing. Pseudo-muxer for regression testing.
g722: |
  raw G.722.
g723_1: |
  raw G.723.1.
g726: |
  raw big-endian G.726 ("left-justified").
g726le: |
  raw little-endian G.726 ("right-justified").
gif: |
  GIF muxer. Animated GIF output with 256-color palette.
  No audio support. Limited color depth but universal web playback.
gsm: |
  raw GSM.
gxf: |
  GXF (General eXchange Format).
h261: |
  raw H.261.
h263: |
  raw H.263.
h264: |
  Raw H.264 muxer. Outputs H.264 Annex B bitstream without container.
  Useful for extracting raw video elementary streams.
hash: |
  SHA-256 hash testing. Pseudo-muxer for output verification.
hds: |
  HDS (HTTP Dynamic Streaming). Adobe's adaptive streaming for Flash. Muxing only. Creates F4F fragments. Legacy format.
hevc: |
  Raw HEVC muxer. Outputs H.265 Annex B bitstream without container.
  Used for raw elementary stream output.
hls: |
  HLS (Apple HTTP Live Streaming) muxer. Creates M3U8 playlists and .ts segments.
  Options: `hls_time`, `hls_list_size`, `hls_segment_filename`. Standard for adaptive streaming.
iamf: |
  Raw Immersive Audio Model and Formats.
ico: |
  Microsoft Windows ICO.
ilbc: |
  iLBC storage.
image2: |
  Image sequence muxer. Writes individual image files using a numbered pattern.
  Example: `image2 img%04d.png` writes img0001.png, img0002.png, etc.
image2pipe: |
  Piped image sequence muxer. Writes image data to stdout for piped workflows.
  Used for streaming image output to other processes.
ipod: |
  iPod H.264 MP4. MP4 with iPod-compatible constraints. Muxing only. Ensures playback on classic Apple iPod.
ircam: |
  Berkeley/IRCAM/CARL Sound Format.
ismv: |
  ISMV/ISMA (Smooth Streaming). Microsoft adaptive streaming for IIS. Muxing only. Creates fragmented MP4 segments.
ivf: |
  IVF muxer. Simple container for VP8/VP9/AV1 bitstreams.
  Common in codec testing and WebM development.
jacosub: |
  JACOsub subtitle format.
kvag: |
  Simon & Schuster Interactive VAG.
latm: |
  LOAS/LATM. AAC in Low-overhead Audio Transport Multiplex. Muxing only. DAB+ digital radio and satellite broadcast.
lc3: |
  LC3 (Low Complexity Communication Codec).
lrc: |
  LRC lyrics.
m4v: |
  raw MPEG-4 video.
matroska: |
  Matroska (MKV) muxer. Open-standard container supporting virtually all codecs.
  Supports chapters, attachments, multiple audio/subtitle tracks, and menus.
mcc: |
  MacCaption.
md5: |
  MD5 muxer. Computes MD5 hash of encoded output for regression testing.
  No actual output file — used for verification.
microdvd: |
  MicroDVD subtitle format.
mjpeg: |
  raw MJPEG video.
mkvtimestamp_v2: |
  MKV timestamp extraction. Outputs timestamps as mkvtoolnix v2 timecode format. Muxing only. External timestamp files.
mlp: |
  raw MLP.
mmf: |
  Yamaha SMAF.
mov: |
  QuickTime / MOV muxer. Apple's multimedia container, very similar to MP4.
  Use for macOS/iOS compatibility. Supports ProRes, AAC, and most codecs.
mp2: |
  MP2 (MPEG Audio Layer II). Raw MPEG broadcast audio. Muxing only. Standard in DVB and DVD audio.
mp3: |
  Raw MP3 muxer. Writes MP3 audio with ID3v2 tags.
  The universal audio output format.
mp4: |
  MP4 (MPEG-4 Part 14) muxer. The most widely used multimedia container for output.
  Supports H.264, HEVC, AAC, and most modern codecs. Options: `movflags`, `brand`, `use_editlist`.
mpeg: |
  MPEG-1 Systems / MPEG program stream.
mpeg1video: |
  Raw MPEG-1 video muxer. Outputs MPEG-1 video bitstream without container.
  Legacy format for Video CD compatibility.
mpeg2video: |
  Raw MPEG-2 video muxer. Outputs MPEG-2 video bitstream without container.
  Used in broadcast workflows where raw ES is needed.
mpegts: |
  MPEG Transport Stream muxer. Container for DVB, ATSC, IPTV, and HLS.
  Robust for streaming with error recovery. Options: `mpegts_m2ts_mode`, `pes_size`.
mpjpeg: |
  MIME multipart JPEG.
mulaw: |
  PCM mu-law.
mxf: |
  MXF (Material eXchange Format).
mxf_d10: |
  MXF D-10 (SMPTE 386M). Professional broadcast MXF with MPEG-2. Muxing only. Broadcast server exchange standard.
mxf_opatom: |
  MXF OP-Atom (SMPTE 390M). Simple essence-only MXF. Muxing only. News and sports production.
nut: |
  NUT.
obu: |
  AV1 low overhead OBU.
oga: |
  Ogg Audio. Ogg container for Vorbis/Opus/FLAC audio. Muxing only. Open Xiph.org format.
ogg: |
  OGG muxer. Xiph.org container for Vorbis, Opus, FLAC, and Theora.
  Open and royalty-free. Common for web audio (Vorbis/Opus).
ogv: |
  Ogg Video. Ogg container for Theora+Vorbis. Muxing only. Open video format. Superseded by WebM.
oma: |
  Sony OpenMG audio.
opus: |
  Ogg Opus. Opus audio in Ogg container. Muxing only. State-of-the-art audio for streaming and VoIP.
psp: |
  PSP MP4. Sony PlayStation Portable compatible MP4. Muxing only. PSP media player.
rawvideo: |
  raw video.
rcwt: |
  RCWT (Raw Captions With Time).
rm: |
  RealMedia.
roq: |
  raw id RoQ.
rso: |
  Lego Mindstorms RSO.
rtp: |
  RTP output.
rtp_mpegts: |
  RTP/MPEG-TS output. MPEG-TS over RTP for network streaming. Muxing only. RTSP/RTP servers.
rtsp: |
  RTSP output.
s16be: |
  PCM signed 16-bit big-endian.
s16le: |
  PCM signed 16-bit little-endian.
s24be: |
  PCM signed 24-bit big-endian.
s24le: |
  PCM signed 24-bit little-endian.
s32be: |
  PCM signed 32-bit big-endian.
s32le: |
  PCM signed 32-bit little-endian.
s8: |
  PCM signed 8-bit.
sap: |
  SAP output.
sbc: |
  raw SBC.
scc: |
  Scenarist Closed Captions.
segment: |
  Segment muxer. Splits output into timed segments for HLS/DASH. Muxing only. Adaptive streaming segment generation.
smjpeg: |
  SMJPEG muxer. Loki SDL movie format for games.
  Legacy format, rarely used.
smoothstreaming: |
  Smooth Streaming Muxer. Microsoft IIS Media Services adaptive streaming. Muxing only. Creates ISMV/ISMA fragmented MP4.
sox: |
  SoX (Sound eXchange) native.
spdif: |
  IEC 61937 (used on S/PDIF - IEC958).
spx: |
  Ogg Speex. Speex speech codec in Ogg container. Muxing only. Open-source speech codec from Xiph.org. Largely superseded by Opus.
srt: |
  SubRip subtitle.
ssegment: |
  Streaming segment muxer. Splits output into timed segments. Muxing only. For live adaptive streaming.
stream_segment: |
  Streaming segment muxer (alias). Muxing only. Timed segment splitting for adaptive streaming.
streamhash: |
  Per-stream SHA-256 hash testing. Pseudo-muxer. Muxing only. For per-stream verification.
sup: |
  raw HDMV Presentation Graphic Stream subtitles.
svcd: |
  MPEG-2 PS (SVCD). Super Video CD program stream. Muxing only. Enhanced VCD with MPEG-2 video at ~2.6 Mbit/s. Popular in Asia for video distribution.
swf: |
  SWF (ShockWave Flash).
tee: |
  Multiple muxer tee. Duplicates output to multiple muxers simultaneously. Muxing only. For parallel output to different formats.
truehd: |
  raw TrueHD.
tta: |
  TTA (True Audio).
ttml: |
  TTML (Timed Text Markup Language). W3C XML subtitle format. Muxing only. Used in broadcast (EBU-TT-D) and streaming (IMSC1).
u16be: |
  PCM unsigned 16-bit big-endian.
u16le: |
  PCM unsigned 16-bit little-endian.
u24be: |
  PCM unsigned 24-bit big-endian.
u24le: |
  PCM unsigned 24-bit little-endian.
u32be: |
  PCM unsigned 32-bit big-endian.
u32le: |
  PCM unsigned 32-bit little-endian.
u8: |
  PCM unsigned 8-bit.
uncodedframecrc: |
  Uncoded frame CRC testing. Pseudo-muxer for raw frame verification.
vc1: |
  raw VC-1 video.
vc1test: |
  VC-1 test bitstream.
vcd: |
  MPEG-1 Systems (VCD). Video CD program stream at ~1.15 Mbit/s. Muxing only. Standard for VCD authoring. VHS-quality on CD-ROM.
vidc: |
  PCM Archimedes VIDC.
vob: |
  MPEG-2 PS (VOB). DVD-Video Object container at up to 9.8 Mbit/s. Muxing only. DVD-Video authoring with MPEG-2 video and AC-3/DTS audio.
voc: |
  Creative Voice.
vvc: |
  raw H.266/VVC video.
w64: |
  Sony Wave64.
wav: |
  WAV muxer. Microsoft/IBM audio container. Common for PCM and other codecs.
  Supports metadata (RIFF INFO tags). Standard for uncompressed audio output.
webm: |
  WebM muxer. Google's subset of Matroska for web video.
  Only supports VP8/VP9 video and Vorbis/Opus audio. HTML5 compatible.
webm_chunk: |
  WebM Chunk Muxer. Splits WebM into chunks for DASH/HLS segmenting. Muxing only. Creates fragmented WebM for adaptive streaming.
webm_dash_manifest: |
  WebM DASH Manifest.
webp: |
  WebP. Google's image format based on VP8. Muxing only. Better compression than JPEG/PNG. Supports lossy, lossless, alpha, animation.
webvtt: |
  WebVTT subtitle.
whip: |
  WHIP (WebRTC-HTTP ingestion protocol). WebRTC streaming output. Muxing only. Standard for browser-based live streaming.
wsaud: |
  Westwood Studios audio.
wtv: |
  Windows Television (WTV).
wv: |
  raw WavPack.
yuv4mpegpipe: |
  YUV4MPEG pipe.
