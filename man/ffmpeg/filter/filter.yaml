a3dscope: |
  Converts input audio to a 3D oscilloscope video output for visual waveform monitoring.
aap: |
  Applies Affine Projection algorithm for adaptive filtering. Used for echo cancellation and noise reduction on the first audio stream.
abench: |
  Benchmark part of an audio filtergraph. Measures and reports filter processing time.
abitscope: |
  Converts input audio to a bit-scope visualization showing individual bit states of audio samples.
abuffer: |
  Audio source filter. Buffer audio frames, and make them accessible to the filterchain.
abuffersink: |
  Audio sink filter. Buffer audio frames, and make them available to the end of the filter graph.
acompressor: |
  Reduces audio dynamic range by attenuating signals above a threshold. A standard studio compressor with attack/release timing, ratio, and makeup gain for louder, more consistent audio.
acontrast: |
  Simple dynamic range compression/expansion. Enhances quiet parts and/or reduces loud parts for more even audio levels.
acopy: |
  Copy the input audio unchanged to the output. Passes audio through without modification.
  Same as `copy` but for audio streams.
acrossfade: |
  Smoothly crossfades between two audio streams over a specified duration. For seamless transitions between tracks or segments.
acrossover: |
  Splits audio into separate frequency bands (crossover filter). Each band is output as a separate stream for multi-band processing.
acrusher: |
  Reduces audio bit depth for a lo-fi digital distortion effect. Creates harsh, crunchy sound with options for logarithmic crushing and anti-aliasing.
acue: |
  Delays audio filtering to synchronize with a cue point. For A/V sync correction in edit workflows.
addroi: |
  Video filter. Add region of interest to frame.
adeclick: |
  Removes impulsive clicks and pops from audio (vinyl, shellac). Detects transient spikes and replaces them with autoregressive-interpolated samples.
adeclip: |
  Repairs clipped/digitally-distorted audio. Detects flat-topped waveforms from clipping and reconstructs lost peaks via autoregressive interpolation.
adecorrelate: |
  Applies decorrelation to reduce correlation between audio channels. Used in surround sound processing to improve spatial perception.
adelay: |
  Delay one or more audio channels by the specified number of milliseconds.
  Example: `adelay=500|500` delays both channels by 500ms.
adenorm: |
  Prevents CPU denormalization issues by adding extremely low-level noise. Fixes performance drops with very quiet audio signals on some processors.
aderivative: |
  Computes the time derivative of the audio signal. Used for transient detection and analysis of audio waveforms.
adrawgraph: |
  Draws a metadata graph as video output. Visualizes real-time audio metadata values from other filters.
adrc: |
  Audio Spectral Dynamic Range Controller. Applies frequency-dependent dynamic range compression for broadcast loudness management.
adynamicequalizer: |
  Dynamic equalizer that applies EQ boost/cut only when signal crosses a threshold at a specific frequency. Combines compressor behavior with parametric EQ for responsive tonal shaping.
adynamicsmooth: |
  Applies dynamic smoothing to audio. Adapts smoothing amount based on signal characteristics for natural noise reduction without excessive filtering.
aecho: |
  Adds echo/reverb by creating delayed, decaying copies of the original signal. Simulates natural sound reflections in rooms, canyons, or halls.
aemphasis: |
  Applies or reverses pre-emphasis filter curves (RIAA, Columbia, EMI). Corrects frequency response for vinyl record archival or FM broadcast playback.
aeval: |
  Filters audio using mathematical expressions per sample or channel. Powerful for custom audio processing via formula-based manipulation.
aevalsrc: |
  Generates audio from mathematical expressions. Creates test tones, sine waves, or custom waveforms using formula-based audio synthesis.
aexciter: |
  Adds high-frequency harmonics for a crisper, brighter sound. Unlike simple EQ boost, generates new harmonic content for perceived loudness and presence.
afade: |
  Fade in/out the audio volume.
  Example: `afade=t=in:ss=0:d=5` fades in over 5 seconds, `afade=t=out:st=30:d=5` fades out.
afdelaysrc: |
  Generates fractional delay FIR coefficients. Used for precision audio delay and phase alignment in filter design.
afftdn: |
  Denoises audio using FFT analysis. Reduces constant background noise (white noise, vinyl, tape hiss) with adaptive noise floor tracking and spectral subtraction.
afftfilt: |
  Applies arbitrary mathematical expressions to audio in the frequency domain. For advanced spectral processing, EQ, and frequency-domain filtering.
afir: |
  Audio filter. Apply Finite Impulse Response filter with supplied coefficients in additional stream(s).
afireqsrc: |
  Generates FIR equalizer coefficients as an audio stream. Used to design and apply custom finite impulse response equalizer filters.
afirsrc: |
  Generates FIR (Finite Impulse Response) filter coefficients as audio. Used in convolution and custom filter design workflows.
aformat: |
  Convert the input audio to the specified sample format, sample rate, and channel layout.
  Example: `aformat=sample_fmts=s16:sample_rates=44100:channel_layouts=stereo`.
afreqshift: |
  Shifts all audio frequencies by a fixed Hz amount. Creates alien/robotic pitch-shifting without changing playback speed. Bode frequency shifting.
afwtdn: |
  Denoises audio using wavelet transform decomposition. Effective for non-stationary noise with time-frequency analysis of the signal.
agate: |
  Audio gate that silences signals below a threshold. Useful for removing background noise between speech or music. Attack/release timing prevents harsh cutoffs.
agraphmonitor: |
  Shows real-time filtergraph statistics as video. Displays throughput, format, and timing information for debugging filter chains.
ahistogram: |
  Converts input audio to a histogram video visualization showing the distribution of audio sample values.
aiir: |
  Audio filter. Apply Infinite Impulse Response filter with supplied coefficients.
aintegral: |
  Computes the time integral of the audio signal. Used for cumulative analysis and digital signal processing applications.
ainterleave: |
  Temporally interleave audio inputs. Alternates audio from each input.
  Example: `ainterleave=inputs=2`.
alatency: |
  Reports the audio filtering latency introduced by the filtergraph. For measuring and compensating processing delay in live pipelines.
alimiter: |
  Lookahead limiter preventing signal from exceeding a ceiling. No distortion from clipping. Auto-release and auto-level options for broadcast-safe audio.
allpass: |
  Applies a two-pole all-pass filter. Alters phase response without changing amplitude. Used in phaser effects and reverb design.
allrgb: |
  Generates an all-RGB-colors test pattern (4096x4096 pixels). Every possible 8-bit RGB color shown once.
allyuv: |
  Generates an all-YUV-colors test pattern. Shows the complete YUV color space for testing and calibration.
aloop: |
  Loop audio samples a specified number of times.
  Example: `aloop=loop=3:size=1024` loops 1024 samples 3 times.
alphaextract: |
  Extracts the alpha channel as a grayscale image stream. For separating transparency data from video with alpha.
alphamerge: |
  Merges a second input's alpha channel into the first input's video. Combines RGB video with a separate transparency mask.
amerge: |
  Combines multiple audio streams into a single multi-channel stream. Merges separate mono tracks into stereo or surround configurations.
ametadata: |
  Manipulates audio frame metadata. Display, modify, or delete metadata key-value pairs for pipeline control and information passing.
amix: |
  Mix multiple audio streams together. Combines audio from different inputs.
  Example: `amix=inputs=2:duration=longest`.
amovie: |
  Reads audio from a movie file as a filter source. Loads audio tracks from video containers without separate input declarations.
amplify: |
  Amplifies changes between successive video frames. Highlights motion by boosting inter-frame differences. Motion visualization tool.
amultiply: |
  Multiplies two audio streams sample-by-sample. For amplitude modulation and audio signal processing combining.
anequalizer: |
  High-order parametric multi-band equalizer with up to 20 bands per channel. Precise frequency shaping with adjustable Q, gain, and frequency per band.
anlmdn: |
  Reduces broadband noise using Non-Local Means algorithm. Compares surrounding audio patches to distinguish noise from signal. Preserves detail better than spectral gating.
anlmf: |
  Audio filter. Apply Normalized Least-Mean-Fourth algorithm to first audio stream.
anlms: |
  Audio filter. Apply Normalized Least-Mean-Squares algorithm to first audio stream.
anoisesrc: |
  Generate noise audio signal (white, pink, or brown noise).
  Example: `anoisesrc=d=5:c=pink:r=44100` generates 5s of pink noise.
anull: |
  Passes audio through unchanged. A no-op filter useful for filtergraph routing or as a placeholder.
anullsink: |
  Null audio sink. Discards all input audio data.
  Used to consume unwanted audio streams in filtergraphs.
anullsrc: |
  Null audio source. Generates empty audio frames (silence).
  Example: `anullsrc=r=44100:cl=stereo` generates silent stereo audio at 44.1 kHz.
apad: |
  Pad audio with silence. Extends audio duration by appending silence.
  Example: `apad=whole_dur=30000` pads to 30 seconds.
aperms: |
  Sets read/write permissions for output audio frames. Controls filter's access to frame data in complex filtergraphs.
aphasemeter: |
  Converts audio to a phase meter visualization. Shows stereo phase correlation as video for monitoring mono compatibility.
aphaser: |
  Audio filter. Add a phasing effect to the audio.
aphaseshift: |
  Applies phase shifting to audio. Creates phaser-like effects by shifting the phase relationship between frequencies.
apsnr: |
  Audio filter. Measure Audio Peak Signal-to-Noise Ratio.
apsyclip: |
  Audio filter. Audio Psychoacoustic Clipper.
apulsator: |
  Creates tremolo/auto-pan effects by modulating left/right volume with an LFO (sine/triangle/square). Phase offset between channels produces stereo movement.
arealtime: |
  Slows down filtering to match real-time playback speed. Prevents filtergraph from processing faster than playback rate.
aresample: |
  Converts audio sample rate using libswresample. Can also stretch/squeeze audio or insert/remove silence to match timestamps.
areverse: |
  Reverses audio playback. Flips the audio timeline for creative reverse effects.
arls: |
  Audio filter. Apply Recursive Least Squares algorithm to first audio stream.
arnndn: |
  Denoises audio using a Recurrent Neural Network (RNNoise). AI-based noise reduction trained on speech. Requires model.
asdr: |
  Audio filter. Measure Audio Signal-to-Distortion Ratio.
asegment: |
  Segments audio stream at specified timestamps. Splits audio into sections based on time boundaries.
aselect: |
  Conditionally selects audio frames using expressions. Passes or drops frames based on evaluated conditions for programmatic editing.
asendcmd: |
  Sends commands to other filters at specified times. Enables runtime parameter changes in filtergraphs via scripted scheduling.
asetnsamples: |
  Sets the number of samples per audio frame. Controls audio frame size for downstream processing requirements.
asetpts: |
  Set PTS for audio output frames. Controls audio timing.
  Example: `asetpts=0.5*PTS` doubles playback speed.
asetrate: |
  Changes sample rate metadata without altering PCM data. Shifts both speed and pitch (e.g., playing 44.1kHz audio at 48kHz).
asettb: |
  Sets the timebase for audio output frames. Controls timestamp precision for downstream filter or muxer expectations.
ashowinfo: |
  Shows audio frame information as log messages. Displays timestamp, sample count, format, and channel layout for debugging.
asidedata: |
  Shows audio side data as video. Visualizes metadata attached to audio frames.
asisdr: |
  Audio filter. Measure Audio Scale-Invariant Signal-to-Distortion Ratio.
asoftclip: |
  Audio soft clipper. Applies soft clipping saturation that smoothly rounds off peaks instead of hard digital clipping. Musical harmonic distortion.
aspectralstats: |
  Audio filter. Show frequency domain statistics about audio frames.
asplit: |
  Splits audio into multiple identical outputs. Routes the same audio to parallel filter chains.
ass: |
  Render ASS subtitles onto input video using the libass library.
  Supports full ASS styling including fonts, colors, and animations.
astats: |
  Computes and displays audio statistics. Measures RMS, peak, dynamic range, DC offset, noise floor, and other audio quality metrics.
astreamselect: |
  Selects audio streams by index from multiple inputs. For switching between alternate audio sources in a filtergraph.
asubboost: |
  Boosts sub-bass frequencies. Enhances low-end content for bass-heavy music or cinema sound.
asubcut: |
  Cuts sub-bass frequencies below a cutoff. Removes rumble and sub-bass noise while preserving bass content.
asupercut: |
  Cuts super-high frequencies above a cutoff. Removes ultrasonic content or harshness above the specified frequency.
asuperpass: |
  Applies a super-high-frequency bandpass filter. Passes only frequencies within the specified high-frequency range.
asuperstop: |
  Applies a super-high-frequency bandstop (notch) filter. Removes a specific band of very high frequencies.
atadenoise: |
  Adaptive temporal averaging de-noiser. Good quality for moderate noise.
  Slower than hqdn3d but better at preserving detail.
atempo: |
  Changes audio playback speed without affecting pitch. Supports 0.5x to 100x speed. Values above 2x skip samples by default.
atilt: |
  Audio filter. Apply spectral tilt to audio.
atrim: |
  Trims audio to a specified time range. Keeps only audio between start and end timestamps.
avectorscope: |
  Converts audio to an audio vectorscope (Lissajous) video visualization. Shows stereo image and phase relationship.
avgblur: |
  Average blur filter. Simple and fast blur.
  Example: `avgblur=5` applies 5px average blur.
avgblur_opencl: |
  Video filter. Apply average blur filter.
avgblur_vulkan: |
  Video filter. Apply avgblur mask to input video.
avsynctest: |
  Media filter. Generate an Audio Video Sync Test.
axcorrelate: |
  Computes cross-correlation between two audio streams. Measures similarity or time offset between signals.
azmq: |
  Listens for ZeroMQ commands to modify filter parameters in real-time. Network-based runtime control of filtergraph settings.
backgroundkey: |
  Video filter. Turns a static background into transparency.
bandpass: |
  Applies a bandpass filter passing only frequencies within a specified range. Isolates a frequency band from the audio signal.
bandreject: |
  Applies a bandstop (notch) filter rejecting frequencies within a specified range. Removes a specific frequency band.
bass: |
  Boosts or cuts low (bass) frequencies using a shelving filter. Like a hi-fi bass tone control with -20 to +20 dB range.
bbox: |
  Video filter. Compute bounding box for each frame.
bench: |
  Benchmark part of a filtergraph. Measures and reports filter processing time.
bilateral: |
  Applies bilateral filter for edge-preserving smoothing. Reduces noise while preserving edges and detail in video.
bilateral_cuda: |
  Video filter. GPU accelerated bilateral filter.
biquad: |
  Audio filter. Apply a biquad IIR filter with the given coefficients.
bitplanenoise: |
  Measures bit plane noise levels in video. Quantifies noise in each bit plane for quality analysis.
blackdetect: |
  Video filter. Detect video intervals that are (almost) black.
blackdetect_vulkan: |
  Video filter. Detect video intervals that are (almost) black.
blackframe: |
  Video filter. Detect frames that are (almost) black.
blend: |
  Blends two video streams using various modes (add, subtract, multiply, screen, overlay, softlight, etc.). For compositing and transitions.
blend_vulkan: |
  Video filter. Blend two video frames in Vulkan.
blockdetect: |
  Detects blocking artifacts in compressed video. Measures blockiness for quality metrics and artifact analysis.
blurdetect: |
  Detects blur in video frames. Measures sharpness/blur levels for quality assessment of footage.
bm3d: |
  Block-matching 3D denoising filter. State-of-the-art video denoiser using block matching and 3D transform for excellent noise reduction.
boxblur: |
  Applies box (average) blur to video. Simple fast blur using averaging over a square pixel neighborhood.
boxblur_opencl: |
  Video filter. Apply boxblur filter to input video.
bs2b: |
  Bauer stereo-to-binaural transformation for headphones. Simulates natural speaker crossfeed that occurs with real speakers, reducing headphone fatigue.
buffer: |
  Video source filter. Buffer video frames, and make them accessible to the filterchain.
buffersink: |
  Video sink filter. Buffer video frames, and make them available to the end of the filter graph.
bwdif: |
  Bob Weaver Deinterlacing Filter. Motion-adaptive deinterlacer based on yadif with improved interpolation. High quality at moderate speed.
bwdif_cuda: |
  Bob Weaver Deinterlacing Filter using NVIDIA CUDA. GPU-accelerated motion-adaptive deinterlacing on NVIDIA hardware.
bwdif_vulkan: |
  Video filter. Deinterlace Vulkan frames via bwdif.
cas: |
  Contrast Adaptive Sharpening. Sharpens video while preserving detail in low-contrast areas. AMD's FidelityFX CAS algorithm.
ccrepack: |
  Video filter. Repack CEA-708 closed caption metadata.
cellauto: |
  Cellular automaton video source. Generates patterns based on Conway's Game of Life rules and custom rule sets.
channelmap: |
  Remaps audio channels to a custom layout. Rearranges or duplicates channels for format conversion.
channelsplit: |
  Splits multi-channel audio into individual per-channel streams. Separates stereo into left/right mono channels.
chorus: |
  Adds chorus effect by layering slightly delayed and modulated copies of the audio. Creates rich, thick, ensemble-like sound.
chromaber_vulkan: |
  Video filter. Offset chroma of input video (chromatic aberration).
chromahold: |
  Removes all color information except the specified hue range. Creates a selective color effect with everything else in grayscale.
chromakey: |
  Turns a specified color range transparent for compositing. Classic green/blue screen keying with adjustable similarity and blend parameters.
chromakey_cuda: |
  Video filter. GPU accelerated chromakey filter.
chromanr: |
  Video filter. Reduce chrominance noise.
chromashift: |
  Shifts chroma channels spatially. Creates color fringing effects or corrects color registration errors.
ciescope: |
  CIE color space scope visualization. Shows video chrominance in CIE 1931/1976 color space diagrams for color analysis.
codecview: |
  Video filter. Visualize information about some codecs.
color: |
  Generates a solid color video source of specified size and duration. Used for backgrounds, padding, and test patterns.
color_vulkan: |
  Video source filter. Generate a constant color (Vulkan).
colorbalance: |
  Adjusts red-cyan, green-magenta, and blue-yellow balance independently for shadows, midtones, and highlights.
colorchannelmixer: |
  Remixes color channels with custom coefficients. Maps each output channel as a weighted sum of input channels for creative color effects.
colorchart: |
  Generate color chart video source for test patterns.
colorcontrast: |
  Video filter. Adjust color contrast between RGB components.
colorcorrect: |
  Video filter. Adjust color white balance selectively for blacks and whites.
colordetect: |
  Video filter. Detect video color properties.
colorhold: |
  Desaturates all colors except a specified hue range. Partial chromahold that reduces saturation rather than removing it entirely.
colorize: |
  Video filter. Overlay a solid color on the video stream.
colorkey: |
  Turns a specified color transparent for overlay compositing. Simpler than chromakey for flat-color backgrounds.
colorkey_opencl: |
  Video filter. Turns a certain color into transparency. Operates on RGB colors.
colorlevels: |
  Adjusts color levels by mapping input ranges to output ranges. Like Photoshop levels adjustment for shadows/midtones/highlights.
colormap: |
  Media filter. Apply custom Color Maps to video stream.
colormatrix: |
  Converts between color matrices (BT.601, BT.709, BT.2020, SMPTE 240M, FCC). Changes color space conversion coefficients.
colorspace: |
  Converts between color spaces (BT.601, BT.709, BT.2020) and transfer characteristics. Essential for proper color management in video pipelines.
colorspace_cuda: |
  Video filter. CUDA accelerated video color converter.
colorspectrum: |
  Video source filter. Generate colors spectrum.
colortemperature: |
  Adjusts color temperature of the video. Shifts the white balance between warm (lower Kelvin) and cool (higher Kelvin).
compand: |
  Audio filter. Compress or expand audio dynamic range.
compensationdelay: |
  Audio filter. Audio Compensation Delay Line.
concat: |
  Concatenates multiple audio/video streams sequentially. Joins separate clips into a continuous stream without re-encoding when possible.
convolution: |
  Video filter. Apply convolution filter.
convolution_opencl: |
  Video filter. Apply convolution mask to input video.
convolve: |
  Applies convolution of two video streams. For custom filtering, blurring, or sharpening using a second stream as a kernel.
copy: |
  Passes video frames through without modification. No-op filter for routing or preserving original content in filterchains.
corr: |
  Video filter. Calculate the correlation between two video streams.
cover_rect: |
  Video filter. Find and cover a user specified object.
crop: |
  Crops video to specified dimensions at a given position. Removes outer portions of the frame. Supports expression-based auto-cropping for black bar removal.
cropdetect: |
  Auto-detect crop size. Determines the optimal crop values to remove black bars.
  Useful as a first pass to find crop values, then apply `crop` in a second pass.
crossfeed: |
  Audio filter. Apply headphone crossfeed filter.
crystalizer: |
  Audio filter. Simple audio noise sharpening filter.
cue: |
  Video filter. Delay filtering to match a cue.
curves: |
  Applies color adjustments using customizable RGB curves (like Photoshop curves tool). Maps input pixel values to output via spline interpolation.
datascope: |
  Shows video pixel data values as text overlay. Displays hex/decimal values and coordinates for precise pixel inspection.
dblur: |
  Video filter. Apply Directional Blur filter.
dcshift: |
  Audio filter. Apply a DC shift to the audio.
dctdnoiz: |
  Video filter. Denoise frames using 2D DCT.
deband: |
  Removes color banding artifacts by dithering gradients. Adds subtle noise to smooth visible steps in gradient areas of compressed video.
deblock: |
  Removes blocking artifacts from compressed video. Detects and smooths block edges with adjustable strength. For low-bitrate MPEG/H.264 artifact removal.
decimate: |
  Drops duplicate frames to reduce frame rate. Detects and removes near-duplicate frames for inverse telecine and duplicate frame removal.
deconvolve: |
  Video filter. Deconvolve first video stream with second video stream.
dedot: |
  Video filter. Reduce cross-luminance and cross-color.
deesser: |
  Audio filter. Apply de-essing to the audio.
deflate: |
  Morphological deflate filter. Shrinks bright regions in video. Opposite of inflate, reduces bright area extent.
deflicker: |
  Video filter. Remove temporal frame luminance variations.
deinterlace_qsv: |
  Intel Quick Sync Video deinterlacing. Hardware-accelerated deinterlace.
  Very fast, low CPU usage on Intel platforms.
deinterlace_vaapi: |
  Video filter. Deinterlacing of VAAPI surfaces.
dejudder: |
  Removes judder from videos converted between frame rates. Smooths irregular frame timing from pulldown or frame rate conversion.
delogo: |
  Removes logo/watermark from video by interpolating surrounding pixels over the logo area. Simple but effective for static logo removal.
denoise_vaapi: |
  VAAPI video denoising. Hardware-accelerated noise reduction using Video Acceleration API on Linux. Requires VAAPI-capable GPU.
deshake: |
  Stabilizes shaky video by detecting and compensating for camera movement. Reduces handheld camera jitter.
deshake_opencl: |
  Video filter. Feature-point based video stabilization filter.
despill: |
  Removes color spill from green/blue screen footage. Eliminates green or blue fringing on edges of keyed subjects.
detelecine: |
  Reverse telecine (IVTC) filter. Removes 3:2 pulldown from NTSC video to recover original 24fps film content.
dialoguenhance: |
  Audio filter. Audio Dialogue Enhancement.
dilation: |
  Morphological dilation filter. Expands bright regions in video. Increases the size of bright features for edge thickening.
dilation_opencl: |
  Morphological dilation using OpenCL. GPU-accelerated expansion of bright video regions.
displace: |
  Displaces pixels using offset maps from second and third inputs. For barrel distortion, wave effects, and custom spatial transforms.
doubleweave: |
  Video filter. Weave input video fields into double number of frames.
drawbox: |
  Draws a filled or outlined colored rectangle on video. For highlighting regions or adding visual markers.
drawbox_vaapi: |
  Video filter. Draw a colored box on the input video.
drawgraph: |
  Draws a metadata graph on video. Visualizes numeric metadata from other filters as a real-time chart overlay.
drawgrid: |
  Draw a colored grid on the input video.
  Example: `drawgrid=w=100:h=100:color=red@0.5`.
drawtext: |
  Renders text on video using libfreetype. Supports custom fonts, colors, position, timecode, and per-frame expressions for dynamic text overlay.
drmeter: |
  Audio filter. Measure audio dynamic range.
dynaudnorm: |
  Dynamically normalizes audio volume frame-by-frame. Evens out quiet and loud sections without traditional compression — retains dynamic range within each frame.
earwax: |
  Improves headphone listening of stereo audio. Moves sound image from inside the head to outside and in front, simulating speaker crossfeed.
ebur128: |
  EBU R128 loudness scanner. Measures integrated loudness, loudness range, and true peak.
  Used for broadcast loudness compliance.
edgedetect: |
  Detects and highlights edges in video using Canny or other edge detection algorithms. For edge visualization and analysis.
elbg: |
  Quantizes colors using the ELBG (Enhanced LBG) algorithm. Reduces color palette for posterization and artistic effects.
entropy: |
  Video filter. Measure video frames entropy.
epx: |
  Video filter. Scale the input using EPX algorithm.
eq: |
  Adjusts brightness, contrast, saturation, and gamma in one filter. Per-channel gamma control for fine color correction.
equalizer: |
  Boosts or cuts a specific frequency band with a two-pole peaking EQ. Chain multiple for complex multi-band EQ curves.
erosion: |
  Morphological erosion filter. Shrinks bright regions and expands dark regions. For noise removal and feature extraction.
erosion_opencl: |
  Morphological erosion using OpenCL. GPU-accelerated shrinking of bright video regions.
estdif: |
  Edge Slope Tracing Deinterlacing Filter. High-quality deinterlacer using edge-directed interpolation for clean progressive output.
exposure: |
  Video filter. Adjust exposure of the video stream.
extractplanes: |
  Video filter. Extract planes as grayscale frames.
extrastereo: |
  Increases stereo separation and width. Makes left and right channels more different for a wider sound image.
fade: |
  Applies fade-in or fade-out effect to video or audio. Smoothly transitions between black/silence and content.
feedback: |
  Media filter. Apply feedback video filter.
fftdnoiz: |
  FFT-based video denoiser. Reduces noise in the frequency domain with configurable strength and block size.
fftfilt: |
  Video filter. Apply arbitrary expressions to pixels in frequency domain.
field: |
  Extracts a single field (top or bottom) from interlaced video. Separates fields for field-based processing.
fieldhint: |
  Video filter. Field matching using hints.
fieldmatch: |
  Matches fields for inverse telecine. Finds corresponding field pairs to reconstruct progressive frames from telecined content.
fieldorder: |
  Changes field order (top-first to bottom-first or vice versa) for interlaced video. Corrects field dominance mismatches.
fillborders: |
  Fills video borders by extending edge pixels. Replaces black bars with mirrored or stretched content.
find_rect: |
  Finds a rectangular pattern in video frames. Locates specific objects or regions for further processing.
firequalizer: |
  FIR Equalizer. Applies finite impulse response equalization to audio. Precise linear-phase EQ for accurate frequency response control.
flanger: |
  Adds flanger effect to audio. Creates sweeping comb-filter sounds by mixing signal with a modulated delayed copy.
flip_vulkan: |
  Video filter. Flip both horizontally and vertically.
floodfill: |
  Flood fills a region of video with a specified color. Paint bucket tool for video frames.
format: |
  Converts video pixel format without other changes. Ensures downstream filters or encoders receive compatible pixel formats.
fps: |
  Converts video to constant frame rate. Duplicates or drops frames as needed. Normalizes variable-frame-rate sources.
framepack: |
  Video filter. Generate a frame packed stereoscopic video.
framerate: |
  Changes frame rate by interpolating new frames. Creates smoother motion than simple frame duplication using blending interpolation.
framestep: |
  Selects every N-th frame from input. Creates time-lapse or frame-skip effect by discarding intermediate frames.
freezedetect: |
  Detects frozen (static) segments in video. Reports time ranges where frames are identical for quality control.
freezeframes: |
  Replaces specified frame ranges with a frozen (still) frame. For creating pause effects or holding on a specific frame.
frei0r: |
  Applies a frei0r plugin effect. Community-standard plugin API for video effects. Requires frei0r plugins installed.
frei0r_src: |
  Video source filter. Generate a frei0r source.
fspp: |
  Video filter. Apply Fast Simple Post-processing filter.
fsync: |
  Video filter. Synchronize video frames from external source.
gblur: |
  Applies Gaussian blur to video. Smooths with configurable sigma for standard blur effect.
gblur_vulkan: |
  Gaussian blur using Vulkan compute shaders. GPU-accelerated video blurring on Vulkan-capable hardware.
geq: |
  Applies generic video filtering via per-pixel mathematical expressions. Extremely flexible for custom visual effects and transformations.
gradfun: |
  Fixes gradient banding by dithering smooth gradients. Real-time debanding for 8-bit video with visible color steps.
gradients: |
  Generates a gradient video source. Creates smooth color gradients as test patterns or backgrounds.
graphmonitor: |
  Video filter. Show various filtergraph stats.
grayworld: |
  Video filter. Adjust white balance using LAB gray world algorithm.
greyedge: |
  Video filter. Estimates scene illumination by grey edge assumption.
guided: |
  Guided image filter. Edge-preserving smoothing using a guidance image for structure-aware noise reduction.
haas: |
  Audio filter. Apply Haas Stereo Enhancer.
haldclut: |
  Applies a Hald CLUT (Color Lookup Table) from a second stream. Non-destructive color grading using pre-computed color transforms.
haldclutsrc: |
  Video source filter. Provide an identity Hald CLUT.
hdcd: |
  Decodes High Definition Compatible Digital (HDCD) from 16-bit PCM to 20-bit. Restores peak extension and low-level gain from HDCD-encoded CDs.
headphone: |
  Applies HRTF (Head-Related Transfer Function) for binaural headphone rendering of multi-channel audio. Simulates 3D spatial audio.
hflip: |
  Horizontally flips (mirrors) the video. Left-right mirror reflection of the frame.
hflip_vulkan: |
  Video filter. Horizontally flip the input video in Vulkan.
highpass: |
  Attenuates frequencies below a cutoff point. Lets high frequencies pass through. Removes rumble, bass hum, and low-frequency noise.
highshelf: |
  Audio filter. Apply a high shelf filter.
hilbert: |
  Audio source filter. Generate a Hilbert transform FIR coefficients.
histeq: |
  Video filter. Apply global color histogram equalization.
histogram: |
  Generates a histogram video overlay showing brightness distribution. For exposure and dynamic range analysis.
hqdn3d: |
  High quality de-noising using 3D (spatial+temporal) filtering.
  Lightweight denoiser good for live encoding. Example: `hqdn3d=4:3:6:4.5`.
hqx: |
  Magnifies pixel art by 2x/3x/4x using edge-detection algorithm (hq2x/hq3x/hq4x). Keeps pixel art crisp without blur. Popular for retro game upscaling.
hstack: |
  Stack video inputs horizontally (side by side).
  All inputs must have the same height. Example: `[v1][v2]hstack=inputs=2`.
hstack_qsv: |
  Video filter. "Quick Sync Video" hstack.
hstack_vaapi: |
  VAAPI horizontal stacking. Hardware-accelerated stacking of video inputs side by side using VAAPI.
hsvhold: |
  Video filter. Turns a certain HSV range into gray.
hsvkey: |
  Video filter. Turns a certain HSV range into transparency. Operates on YUV colors.
hue: |
  Shifts hue angle and/or adjusts saturation. For color correction or creative color effects on video.
huesaturation: |
  Video filter. Apply hue-saturation-intensity adjustments.
hwdownload: |
  Transfers video frames from GPU to CPU memory. Moves hardware-pixel-format frames back to software processing.
hwmap: |
  Maps hardware video frames between devices. For GPU-to-GPU frame transfers in hardware-accelerated pipelines.
hwupload: |
  Transfers video frames from CPU to GPU memory. Prepares software frames for hardware-accelerated processing.
hwupload_cuda: |
  Video filter. Upload a system memory frame to a CUDA device.
hysteresis: |
  Video filter. Grow first stream into second stream by connecting components.
iccdetect: |
  Video filter. Detect and parse ICC profiles.
iccgen: |
  Generates ICC color profiles from video metadata. Creates color management profiles for display calibration.
identity: |
  No-op filter that passes video unchanged. For measuring filtergraph overhead without processing.
idet: |
  Interlace detection filter. Analyzes frames to determine whether content is progressive, top-field-first, or bottom-field-first.
il: |
  Interleave/Deinterleave audio channels. Rearranges sample ordering for compatibility with different audio APIs.
inflate: |
  Morphological inflation filter. Expands bright regions in video. Opposite of deflate.
interlace: |
  Converts progressive video to interlaced by combining lines from consecutive frames. Halves the frame rate.
interlace_vulkan: |
  Video filter. Convert progressive video into interlaced.
interleave: |
  Interleaves frames from multiple inputs alternately. Creates a merged stream with frames from each source in sequence.
join: |
  Audio filter. Join multiple audio streams into multi-channel output.
kerndeint: |
  Kernel deinterlacing filter. Uses kernel-based interpolation for converting interlaced video to progressive.
kirsch: |
  Applies Kirsch compass edge detection operator. Finds edges in all 8 compass directions for comprehensive edge maps.
ladspa: |
  Applies LADSPA (Linux Audio Developer Simple Plugin API) audio effect. Loads community audio plugins for processing.
lagfun: |
  Video filter. Slowly update darker pixels.
latency: |
  Video filter. Report video filtering latency.
lenscorrection: |
  Corrects lens distortion (barrel/pincushion). Applies radial distortion correction using coefficient parameters.
libplacebo: |
  Video filter. Apply various GPU filters from libplacebo.
libvmaf: |
  Video filter. Calculate the VMAF between two video streams.
life: |
  Conway's Game of Life cellular automaton video source. Generates evolving patterns based on Life rules.
limitdiff: |
  Video filter. Apply filtering with limiting difference.
limiter: |
  Limits pixel component values to a specified range. Clamps values to prevent overflow or underflow in video.
loop: |
  Loops video or audio over a specified range. Repeats a segment continuously for seamless looping playback.
loudnorm: |
  Normalizes loudness to EBU R128 broadcast standards. Targets Integrated Loudness, Loudness Range, and True Peak. Both single-pass and dual-pass modes.
lowpass: |
  Attenuates frequencies above a cutoff point. Lets low frequencies pass through. Removes hiss or creates muffled effects.
lowshelf: |
  Audio filter. Apply a low shelf filter.
lumakey: |
  Video filter. Turns a certain luma into transparency.
lut: |
  Video filter. Compute and apply a lookup table to the RGB/YUV input video.
lut1d: |
  Video filter. Adjust colors using a 1D LUT.
lut2: |
  Video filter. Compute and apply a lookup table from two video inputs.
lut3d: |
  Video filter. Adjust colors using a 3D LUT.
lutrgb: |
  Video filter. Compute and apply a lookup table to the RGB input video.
lutyuv: |
  Video filter. Compute and apply a lookup table to the YUV input video.
mandelbrot: |
  Video source filter. Render a Mandelbrot fractal.
maskedclamp: |
  Media filter. Clamp first stream with second stream and third stream.
maskedmax: |
  Media filter. Apply filtering with maximum difference of two streams.
maskedmerge: |
  Media filter. Merge first stream with second stream using third stream as mask.
maskedmin: |
  Media filter. Apply filtering with minimum difference of two streams.
maskedthreshold: |
  Video filter. Pick pixels comparing absolute difference of two streams with threshold.
maskfun: |
  Creates a mask from video content. Generates binary or alpha masks for compositing workflows.
mcdeint: |
  Motion-compensated deinterlacing. Requires yadif=1/3 input. Uses motion estimation for highest quality deinterlacing at the cost of speed.
mcompand: |
  Multi-band compander. Applies compression and expansion independently to different frequency bands for sophisticated dynamics control.
median: |
  Applies median filter to video. Reduces noise by replacing each pixel with the median of its neighborhood.
mergeplanes: |
  Merges video planes from different streams. Combines color channels from separate inputs into a single output.
mestimate: |
  Estimates motion vectors for subsequent motion-compensated filters. Pre-computes motion data for mcdeint, minterpolate, etc.
metadata: |
  Manipulates video frame metadata. Display, modify, or delete metadata key-value pairs. For pipeline control.
midequalizer: |
  Mid equalizer. Adjusts mid-frequency audio content. Frequency-dependent amplitude control.
minterpolate: |
  Frame rate conversion using motion interpolation (optical flow). Generates smooth slow-motion or frame-rate upconversion with minimal judder.
mix: |
  Mixes multiple audio streams with adjustable weights. Blends audio sources for transitions or layering.
monochrome: |
  Video filter. Convert video to gray using custom color filter.
morpho: |
  Video filter. Apply Morphological filter.
movie: |
  Reads video from a movie file as a filter source. Loads video frames from containers without separate input declarations.
mpdecimate: |
  Drop frames to reduce frame rate by detecting near-duplicate frames. For inverse telecine and reducing redundant content.
mptestsrc: |
  Video source filter. Generate various test pattern.
msad: |
  Video filter. Calculate the MSAD between two video streams.
multiply: |
  Video filter. Multiply first video stream with second video stream.
negate: |
  Negates (inverts) video pixel values. Creates a photographic negative effect by inverting all color channels.
nlmeans: |
  Non-Local Means denoiser. Reduces noise by averaging similar patches across the frame. Excellent quality but computationally expensive.
nlmeans_opencl: |
  Video filter. Non-local means denoiser through OpenCL.
nlmeans_vulkan: |
  Video filter. Non-local means denoiser (Vulkan).
nnedi: |
  Video filter. Apply neural network edge directed interpolation intra-only deinterlacer.
noformat: |
  Video filter. Force libavfilter not to use any of the specified pixel formats for the input to the next filter.
noise: |
  Adds random noise to video. For film grain, dithering, or artistic noise effects with configurable pattern and strength.
normalize: |
  Normalizes RGB video to use the full dynamic range. Stretches histogram to fill available range for consistent brightness.
nullsink: |
  Null video sink. Discards all input video data.
  Used to consume unwanted video streams in filtergraphs.
nullsrc: |
  Null video source. Generates empty video frames (black).
  Example: `nullsrc=s=256x256:r=25` generates 256x256 black video at 25 fps.
openclsrc: |
  Video source filter. Generate video using an OpenCL program.
oscilloscope: |
  2D video oscilloscope visualization. Shows luminance waveform across the frame for broadcast monitoring.
overlay: |
  Places one video on top of another at specified coordinates. Supports opacity, timing, and per-frame positioning expressions for compositing.
overlay_cuda: |
  Video filter. Overlay one video on top of another using CUDA.
overlay_opencl: |
  Video filter. Overlay one video on top of another.
overlay_qsv: |
  Video filter. Quick Sync Video overlay.
overlay_vaapi: |
  Video filter. Overlay one video on top of another.
overlay_vulkan: |
  Video filter. Overlay a source on top of another.
owdenoise: |
  Overcomplete wavelet denoiser. Reduces video noise using overcomplete wavelet transform with adaptive thresholding.
pad: |
  Adds padding around video. Places the original image at specified coordinates within a larger canvas. Adds black bars for aspect ratio conversion.
pad_cuda: |
  Video filter. CUDA-based GPU padding filter.
pad_opencl: |
  Pads video using OpenCL. GPU-accelerated border padding for aspect ratio conversion.
pad_vaapi: |
  Pads video using VAAPI. Hardware-accelerated border padding on Linux.
pal100bars: |
  Video source filter. Generate PAL 100% color bars.
pal75bars: |
  Video source filter. Generate PAL 75% color bars.
palettegen: |
  Generates an optimal color palette from video for GIF/8-bit output. Samples frames and creates a compact palette.
paletteuse: |
  Applies a pre-generated color palette to video. Uses dithering to map colors for GIF or 8-bit output.
pan: |
  Remixes audio channels with custom gain levels. Route any input channel to any output channel for remapping (e.g., 5.1 to stereo).
perlin: |
  Video source filter. Generate Perlin noise.
perms: |
  Sets frame permissions for output video. Controls whether downstream filters can read or modify frame data.
perspective: |
  Corrects perspective distortion by mapping four input corner points to four output positions. For straightening tilted or angled footage.
phase: |
  Adjusts interlaced video field phase. Shifts temporal alignment of fields for correct interlaced display.
photosensitivity: |
  Reduces video flash intensity to prevent photosensitive seizures. Applies damping to sudden brightness changes for epilepsy safety.
pixdesctest: |
  Pixel format descriptor test filter. Validates pixel format conversion paths. Debug/diagnostic tool.
pixelize: |
  Pixelizes (mosaics) video by reducing resolution in blocks. Creates a blocky/mosaic censorship effect.
pixscope: |
  Shows pixel values at a specified point as a video overlay. Inspects individual pixel data for analysis and debugging.
pp7: |
  Postprocessing filter variant 7. Applies denoising and deblocking with the pp7 algorithm.
premultiply: |
  Premultiplies RGB channels by alpha. Converts straight-alpha video to premultiplied-alpha for compositing.
premultiply_dynamic: |
  Video filter. Premultiply or unpremultiply an image in-place, as needed.
prewitt: |
  Applies Prewitt edge detection operator. Highlights horizontal and vertical edges in video.
prewitt_opencl: |
  Prewitt edge detection using OpenCL. GPU-accelerated edge highlighting for horizontal/vertical edges.
procamp_vaapi: |
  Video filter. ProcAmp (color balance) adjustments for hue, saturation, brightness, contrast.
program_opencl: |
  Video filter. Filter video using an OpenCL program.
pseudocolor: |
  Video filter. Make pseudocolored video frames.
psnr: |
  Computes Peak Signal-to-Noise Ratio between two video streams. Quality metric for comparing original vs processed video.
pullup: |
  Pullup inverse telecine filter. Removes 3:2 pulldown from NTSC content to recover 24fps film frames.
qp: |
  Changes quantization parameter (QP) values for encoded video. Modifies per-block quantization for quality control.
random: |
  Randomly selects frames from input. Outputs frames in random order or randomly drops frames for shuffle effects.
readeia608: |
  Reads EIA-608 (CEA-608) closed caption data from video. Extracts line 21/VBI caption information.
readvitc: |
  Reads VITC (Vertical Interval Time Code) from video frames. Extracts timecode embedded in vertical blanking interval.
realtime: |
  Slows filtering to real-time playback speed. Prevents filtergraph from processing faster than display rate.
remap: |
  Remaps pixels using coordinate mapping from second and third inputs. For lens distortion correction and custom spatial transforms.
remap_opencl: |
  Media filter. Remap pixels using OpenCL.
removegrain: |
  Removes film grain and noise from video. Simple spatial denoiser using neighborhood pixel analysis.
removelogo: |
  Removes logo from video using a mask image. Covers logo area with interpolated background pixels.
repeatfields: |
  Repeats fields for proper frame timing. Creates full frames from field-based content.
replaygain: |
  ReplayGain scanner. Analyzes audio loudness and attaches ReplayGain metadata tags for volume normalization across tracks.
reverse: |
  Reverses video playback. Plays frames in reverse order for creative reverse-time effects.
rgbashift: |
  Shifts RGBA channels independently. Creates color fringing/RGB shift effects or corrects chromatic aberration.
rgbtestsrc: |
  Video source filter. Generate RGB test pattern.
roberts: |
  Applies Roberts cross edge detection operator. Simple 2x2 edge detector for finding edges in video.
roberts_opencl: |
  Roberts cross edge detection using OpenCL. GPU-accelerated 2x2 edge operator.
rotate: |
  Rotates video by an arbitrary angle. Supports expression-based angle for dynamic rotation effects.
rubberband: |
  Changes audio tempo/pitch independently using librubberband. High-quality time-stretching with transient preservation (requires --enable-librubberband).
sab: |
  Shape-Adaptive Blur. Edge-preserving blur that adapts to local image structure for natural smoothing.
scale: |
  Resizes video using libswscale. Supports aspect-ratio preservation, pixel format conversion, and various algorithms (bilinear, lanczos, bicubic, etc.).
scale2ref: |
  Media filter. Scale the input video size and/or convert the image format to the given reference.
scale_cuda: |
  Video filter. GPU accelerated video resizer.
scale_qsv: |
  Video filter. Quick Sync Video "scaling and format conversion".
scale_vaapi: |
  Video filter. Scale to/from VAAPI surfaces.
scale_vulkan: |
  Resizes video using Vulkan compute shaders. GPU-accelerated scaling on Vulkan-capable hardware.
scdet: |
  Scene change detection filter. Identifies and reports timestamps where scene transitions occur.
scdet_vulkan: |
  Video filter. Detect video scene change.
scharr: |
  Applies Scharr edge detection operator. More accurate derivative approximation than Sobel for rotationally symmetric edge detection.
scroll: |
  Scrolls video horizontally and/or vertically. Creates scrolling or panning effects on the frame.
segment: |
  Segments video stream at specified timestamps. Splits video into sections based on time boundaries.
select: |
  Conditionally passes or discards frames based on an expression. Select I-frames, scene changes, or frames meeting custom criteria.
selectivecolor: |
  Video filter. Apply CMYK adjustments to specific color ranges.
sendcmd: |
  Sends commands to other filters at specified times. Enables runtime parameter changes via scripted scheduling.
separatefields: |
  Separates interlaced video fields into individual frames. Doubles frame rate by splitting each frame into its top and bottom fields.
setdar: |
  Sets Display Aspect Ratio metadata. Changes the DAR without altering pixel data. For correcting playback aspect ratio.
setfield: |
  Sets interlaced/progressive field order metadata. Marks video as top-field-first, bottom-field-first, or progressive.
setparams: |
  Sets various video frame parameters (sar, range, color space, etc.) without altering pixel data.
setpts: |
  Set presentation timestamp (PTS) for output frames. Controls timing and speed.
  Example: `setpts=0.5*PTS` doubles speed, `setpts=2*PTS` halves speed.
setrange: |
  Video filter. Force color range for the output video frame.
setsar: |
  Sets Sample Aspect Ratio metadata. Changes the SAR without altering pixel data.
settb: |
  Sets timebase for output frames. Controls timestamp precision for muxer compatibility.
sharpness_vaapi: |
  VAAPI video sharpening. Hardware-accelerated sharpness enhancement using Video Acceleration API.
shear: |
  Applies shear transformation to video. Tilts the image along horizontal and/or vertical axes.
showcqt: |
  Media filter. Convert input audio to a CQT (Constant/Clamped Q Transform) spectrum video output.
showcwt: |
  Media filter. Convert input audio to a CWT (Continuous Wavelet Transform) spectrum video output.
showfreqs: |
  Media filter. Convert input audio to a frequencies video output.
showinfo: |
  Shows video frame information as log messages. Displays timestamp, format, dimensions, and type for debugging.
showpalette: |
  Displays the color palette of 8-bit video as a grid. For inspecting palette-based video content.
showspatial: |
  Media filter. Convert input audio to a spatial video output.
showspectrum: |
  Media filter. Convert input audio to a spectrum video output.
showspectrumpic: |
  Media filter. Convert input audio to a spectrum video output single picture.
showvolume: |
  Media filter. Convert input audio volume to video output.
showwaves: |
  Media filter. Convert input audio to a video output.
showwavespic: |
  Media filter. Convert input audio to a video output single picture.
shuffleframes: |
  Reorders video frames. Rearranges frame sequence using a specified shuffle pattern.
shufflepixels: |
  Shuffles pixels within each frame. Randomizes pixel positions for mosaic or disorder effects.
shuffleplanes: |
  Shuffles (reorders) video color planes. Rearranges YUV/RGB plane order for format conversion or creative effects.
sidechaincompress: |
  Sidechain compressor. Reduces audio level based on another audio stream (the sidechain). For ducking vocals when announcer speaks, etc.
sidechaingate: |
  Sidechain gate. Gates audio based on another stream. Silences audio when the sidechain input exceeds a threshold.
sidedata: |
  Shows frame side data as video overlay. Visualizes metadata attached to video frames.
sierpinski: |
  Video source filter. Render a Sierpinski fractal.
signalstats: |
  Computes and displays video signal statistics. Measures peak, average, RMS, and other quality metrics.
signature: |
  Computes video signature/fingerprint for copy detection and content identification.
silencedetect: |
  Detects silence in audio. Reports time ranges where audio level drops below a threshold.
silenceremove: |
  Removes silence from audio. Trims out quiet sections based on duration and threshold parameters.
sinc: |
  Audio source filter. Generate a sinc kaiser-windowed low-pass, high-pass, band-pass, or band-reject FIR coefficients.
sine: |
  Generates a sine wave audio source. Creates test tones at specified frequency and duration.
siti: |
  Video filter. Calculate spatial information (SI) and temporal information (TI).
smartblur: |
  Video filter. Blur the input video without impacting the outlines.
smptebars: |
  Generates SMPTE color bars test pattern. Standard broadcast test signal for calibration and alignment.
smptehdbars: |
  Generates SMPTE HD color bars test pattern. HD variant of the broadcast test signal.
sobel: |
  Applies Sobel edge detection operator. Finds vertical and horizontal edges for edge visualization.
sobel_opencl: |
  Sobel edge detection using OpenCL. GPU-accelerated horizontal/vertical edge finding.
spectrumsynth: |
  Media filter. Convert input spectrum videos to audio output.
speechnorm: |
  Speech normalizer. Levels volume for speech content.
  Good for podcasts and interviews with varying speaker volumes.
split: |
  Splits video into multiple identical outputs. Routes the same video to parallel filter chains.
spp: |
  Video filter. Apply a simple post processing filter.
sr_amf: |
  Super Resolution using AMD AMF. AI-based video upscaling via AMD Advanced Media Framework on Radeon GPUs.
ssim: |
  Computes Structural Similarity Index between two video streams. Perceptual quality metric comparing original vs processed.
ssim360: |
  Video filter. Calculate the SSIM between two 360 video streams.
stereo3d: |
  Converts between 3D video formats (side-by-side, top-bottom, interlaced, etc.). For 3D display format conversion.
stereotools: |
  Manages stereo audio signals — balance, muting, phase inversion, soft-clipping, and Mid/Side conversion.
stereowiden: |
  Audio filter. Apply stereo widening effect.
streamselect: |
  Selects streams by index from multiple inputs. Switches between alternate video sources.
subtitles: |
  Renders subtitles (SRT, ASS, etc.) onto video using libass. Supports styling, positioning, and font embedding.
super2xsai: |
  Super 2xSaI pixel art upscaler. 2x magnification algorithm for retro game graphics with smooth edges.
superequalizer: |
  Audio filter. Apply 18 band equalization filter.
surround: |
  Audio filter. Apply audio surround upmix filter.
swaprect: |
  Swaps two rectangular regions within a video frame. For region exchange effects.
swapuv: |
  Swaps U and V chroma channels. Inverts or exchanges color difference signals for creative effects.
tblend: |
  Blends successive video frames together. Temporal blending for motion blur or dissolve effects.
telecine: |
  Applies telecine (3:2 pulldown) to convert 24fps film to 29.97fps NTSC. Adds pulldown fields for broadcast.
testsrc: |
  Video source filter. Generate test pattern.
testsrc2: |
  Video source filter. Generate another test pattern.
thistogram: |
  Generates a temporal histogram showing brightness distribution over time.
threshold: |
  Media filter. Threshold first video stream using other video streams.
thumbnail: |
  Video filter. Select the most representative frame in a given sequence of consecutive frames.
thumbnail_cuda: |
  Video filter. Select the most representative frame in a given sequence of consecutive frames using CUDA.
tile: |
  Arranges consecutive frames into a grid/tile layout. For creating contact sheets or proof sheets from video.
tiltandshift: |
  Video filter. Generate a tilt-and-shift'd video.
tiltshelf: |
  Audio filter. Apply a tilt shelf filter.
tinterlace: |
  Temporal interlacing modes. Merges frames into double-height interlaced output or drops every other frame.
tlut2: |
  Video filter. Compute and apply a lookup table from two successive frames.
tmedian: |
  Video filter. Pick median pixels from successive frames.
tmidequalizer: |
  Video filter. Apply Temporal Midway Equalization.
tmix: |
  Video filter. Mix successive video frames.
tonemap: |
  Video filter. Conversion to/from different dynamic ranges.
tonemap_opencl: |
  Video filter. Perform HDR to SDR conversion with tonemapping.
tonemap_vaapi: |
  Video filter. VAAPI VPP for tone-mapping.
tpad: |
  Adds temporal padding (freeze frames or black) at start/end of video. For pre-roll and post-roll sequences.
transpose: |
  Transposes (rotates 90 degrees) and optionally flips video. For portrait/landscape conversion.
transpose_opencl: |
  Transposes video using OpenCL. GPU-accelerated 90-degree rotation and optional flip.
transpose_vaapi: |
  Transposes video using VAAPI. Hardware-accelerated rotation on Linux with VAAPI-capable GPU.
transpose_vulkan: |
  Transposes video using Vulkan compute shaders. GPU-accelerated 90-degree rotation on Vulkan hardware.
treble: |
  Boosts or cuts high (treble) frequencies using a shelving filter. Like a hi-fi treble tone control with -20 to +20 dB.
tremolo: |
  Adds tremolo effect (periodic amplitude modulation). Creates wavering volume at a specified LFO rate.
trim: |
  Trims video to a specified time range. Keeps only frames between start and end timestamps.
unpremultiply: |
  Unpremultiplies alpha from RGB channels. Converts premultiplied-alpha video to straight-alpha for compositing.
unsharp: |
  Sharpens or blurs video via convolution matrix. Negative values blur, positive sharpen. On luma and/or chroma.
unsharp_opencl: |
  Video filter. Apply unsharp mask to input video.
untile: |
  Video filter. Untile a frame into a sequence of frames.
uspp: |
  Video filter. Apply Ultra Simple / Slow Post-processing filter.
v360: |
  Converts between 360 video projections. Equirectangular, cubemap, flat, and other VR format conversions.
vaguedenoiser: |
  Video filter. Apply a Wavelet based Denoiser.
varblur: |
  Video filter. Apply Variable Blur filter.
vectorscope: |
  Generates a vectorscope video visualization. Shows chrominance information for broadcast color monitoring and calibration.
vflip: |
  Vertically flips (upside-down mirror) the video.
vflip_vulkan: |
  Video filter. Vertically flip the input video in Vulkan.
vfrdet: |
  Video filter. Variable frame rate detect filter.
vibrance: |
  Intelligently boosts less-saturated colors while leaving vivid colors untouched. More natural than simple saturation increase.
vibrato: |
  Applies vibrato effect to audio. Creates periodic pitch modulation for musical vibrato sounds.
vidstabdetect: |
  Detects camera shake/stabilization vectors. First pass of vidstab — writes transform data for second pass.
vidstabtransform: |
  Applies stabilization transforms from vidstabdetect. Second pass — corrects camera shake using detected motion vectors.
vif: |
  Video filter. Calculate the VIF between two video streams.
vignette: |
  Adds or removes vignette (corner darkening) effect. Simulates lens vignetting or creates artistic darkened edges.
virtualbass: |
  Creates virtual bass effect by generating harmonics of low frequencies. Makes bass audible on small speakers that can't reproduce low frequencies.
vmafmotion: |
  Video filter. Calculate the VMAF Motion score.
volume: |
  Adjusts audio volume level. Supports gain, precision, and evaluation expressions for dynamic volume control.
volumedetect: |
  Detects and reports audio volume statistics. Measures RMS, peak, and histogram for audio level analysis.
vpp_amf: |
  Video filter. AMF video scaling and format conversion.
vpp_qsv: |
  Intel Quick Sync Video Post-Processing (VPP). Hardware-accelerated deinterlace, scaling, denoise, and sharpen on Intel GPUs.
vsrc_amf: |
  Video source filter. AMD AMF screen capture.
vstack: |
  Stack video inputs vertically (top and bottom).
  All inputs must have the same width. Example: `[v1][v2]vstack=inputs=2`.
vstack_qsv: |
  Video filter. "Quick Sync Video" vstack.
vstack_vaapi: |
  VAAPI vertical stacking. Hardware-accelerated stacking of video inputs top-to-bottom using VAAPI.
w3fdif: |
  Weston 3 Field Deinterlacing Filter. BBC-developed motion-adaptive deinterlacer using designed filter coefficients. High quality.
waveform: |
  Generates waveform monitor video output. Shows luminance (and chrominance) waveform for broadcast monitoring.
weave: |
  Weaves two fields into a single interlaced frame. Combines top and bottom fields for interlaced output.
xbr: |
  Magnifies pixel art by 2x/3x/4x using edge-detection rules. Preserves sharp pixel-art aesthetics for retro game upscaling.
xcorrelate: |
  Video filter. Cross-correlate first video stream with second video stream.
xfade: |
  Video filter. Cross fade one video with another video.
xfade_opencl: |
  Video filter. Cross fade one video with another video.
xfade_vulkan: |
  Video filter. Cross fade one video with another video.
xmedian: |
  Temporal median filter across multiple frames. Reduces noise and removes transient artifacts by computing per-pixel temporal median.
xpsnr: |
  Video filter. Calculate the extended perceptually weighted peak signal-to-noise ratio (XPSNR) between two video streams.
xstack: |
  Stack video inputs in a custom grid layout.
  Example: `xstack=inputs=4:layout=0_0|w0_0|0_h0|w0_h0` creates a 2x2 grid.
xstack_qsv: |
  Video filter. "Quick Sync Video" xstack.
xstack_vaapi: |
  VAAPI custom stacking. Hardware-accelerated grid layout of video inputs using VAAPI.
yadif: |
  Yet Another Deinterlacing Filter. Converts interlaced to progressive using spatial and temporal interpolation. One of the most commonly used deinterlacers.
yadif_cuda: |
  YADIF deinterlacing using NVIDIA CUDA. GPU-accelerated Yet Another Deinterlacing Filter on NVIDIA hardware.
yaepblur: |
  Yet Another Edge Preserving Blur. Smooths while preserving edges for natural-looking noise reduction.
yuvtestsrc: |
  Video source filter. Generate YUV test pattern.
zmq: |
  Listens for ZeroMQ network commands to modify filter parameters in real-time. TCP-based runtime control of live filtergraphs.
zoneplate: |
  Video source filter. Generate zone-plate.
zoompan: |
  Applies zoom and pan (Ken Burns) effect to video. Smoothly animates crop position and scale for photo-to-video conversion.
zscale: |
  Resizes video using z.lib/zimg library. Higher quality than scale with accurate chroma placement and color-space conversions (requires --enable-libzimg).
