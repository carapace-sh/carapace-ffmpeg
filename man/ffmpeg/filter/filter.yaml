a3dscope: |
  Media filter. Convert input audio to 3d scope video output.
aap: |
  Audio filter. Apply Affine Projection algorithm to first audio stream.
abench: |
  Benchmark part of an audio filtergraph. Measures and reports filter processing time.
abitscope: |
  Media filter. Convert input audio to audio bit scope video output.
abuffer: |
  Audio source filter. Buffer audio frames, and make them accessible to the filterchain.
abuffersink: |
  Audio sink filter. Buffer audio frames, and make them available to the end of the filter graph.
acompressor: |
  Audio filter. Audio compressor.
acontrast: |
  Audio filter. Simple audio dynamic range compression/expansion filter.
acopy: |
  Copy the input audio unchanged to the output. Passes audio through without modification.
  Same as `copy` but for audio streams.
acrossfade: |
  Audio filter. Cross fade two input audio streams.
acrossover: |
  Audio filter. Split audio into per-bands streams.
acrusher: |
  Audio filter. Reduce audio bit resolution.
acue: |
  Audio filter. Delay filtering to match a cue.
addroi: |
  Video filter. Add region of interest to frame.
adeclick: |
  Audio filter. Remove impulsive noise from input audio.
adeclip: |
  Audio filter. Remove clipping from input audio.
adecorrelate: |
  Audio filter. Apply decorrelation to input audio.
adelay: |
  Delay one or more audio channels by the specified number of milliseconds.
  Example: `adelay=500|500` delays both channels by 500ms.
adenorm: |
  Audio filter. Remedy denormals by adding extremely low-level noise.
aderivative: |
  Audio filter. Compute derivative of input audio.
adrawgraph: |
  Media filter. Draw a graph using input audio metadata.
adrc: |
  Audio filter. Audio Spectral Dynamic Range Controller.
adynamicequalizer: |
  Audio filter. Apply Dynamic Equalization of input audio.
adynamicsmooth: |
  Audio filter. Apply Dynamic Smoothing of input audio.
aecho: |
  Audio filter. Add echoing to the audio.
aemphasis: |
  Audio filter. Audio emphasis.
aeval: |
  Audio filter. Filter audio signal according to a specified expression.
aevalsrc: |
  Audio source filter. Generate an audio signal generated by an expression.
aexciter: |
  Audio filter. Enhance high frequency part of audio.
afade: |
  Fade in/out the audio volume.
  Example: `afade=t=in:ss=0:d=5` fades in over 5 seconds, `afade=t=out:st=30:d=5` fades out.
afdelaysrc: |
  Audio source filter. Generate a Fractional delay FIR coefficients.
afftdn: |
  Audio filter. Denoise audio samples using FFT.
afftfilt: |
  Audio filter. Apply arbitrary expressions to samples in frequency domain.
afir: |
  Audio filter. Apply Finite Impulse Response filter with supplied coefficients in additional stream(s).
afireqsrc: |
  Audio source filter. Generate a FIR equalizer coefficients audio stream.
afirsrc: |
  Audio source filter. Generate a FIR coefficients audio stream.
aformat: |
  Convert the input audio to the specified sample format, sample rate, and channel layout.
  Example: `aformat=sample_fmts=s16:sample_rates=44100:channel_layouts=stereo`.
afreqshift: |
  Audio filter. Apply frequency shifting to input audio.
afwtdn: |
  Audio filter. Denoise audio stream using Wavelets.
agate: |
  Audio filter. Audio gate.
agraphmonitor: |
  Media filter. Show various filtergraph stats.
ahistogram: |
  Media filter. Convert input audio to histogram video output.
aiir: |
  Audio filter. Apply Infinite Impulse Response filter with supplied coefficients.
aintegral: |
  Audio filter. Compute integral of input audio.
ainterleave: |
  Temporally interleave audio inputs. Alternates audio from each input.
  Example: `ainterleave=inputs=2`.
alatency: |
  Audio filter. Report audio filtering latency.
alimiter: |
  Audio filter. Audio lookahead limiter.
allpass: |
  Audio filter. Apply a two-pole all-pass filter.
allrgb: |
  Generate all RGB colors test pattern (4096x4096 pixels).
allyuv: |
  Generate all YUV colors test pattern.
aloop: |
  Loop audio samples a specified number of times.
  Example: `aloop=loop=3:size=1024` loops 1024 samples 3 times.
alphaextract: |
  Video filter. Extract an alpha channel as a grayscale image component.
alphamerge: |
  Video filter. Copy the luma value of the second input into the alpha channel of the first input.
amerge: |
  Merge audio streams into a single multi-channel stream.
  Example: `amerge=inputs=2` merges 2 stereo streams into 4-channel audio.
ametadata: |
  Manipulate audio frame metadata (display, modify, or delete key-value pairs).
amix: |
  Mix multiple audio streams together. Combines audio from different inputs.
  Example: `amix=inputs=2:duration=longest`.
amovie: |
  Media filter. Read audio from a movie source.
amplify: |
  Video filter. Amplify changes between successive video frames.
amultiply: |
  Audio filter. Multiply two audio streams.
anequalizer: |
  Audio filter. Apply high-order audio parametric multi band equalizer.
anlmdn: |
  Audio filter. Reduce broadband noise from stream using Non-Local Means.
anlmf: |
  Audio filter. Apply Normalized Least-Mean-Fourth algorithm to first audio stream.
anlms: |
  Audio filter. Apply Normalized Least-Mean-Squares algorithm to first audio stream.
anoisesrc: |
  Generate noise audio signal (white, pink, or brown noise).
  Example: `anoisesrc=d=5:c=pink:r=44100` generates 5s of pink noise.
anull: |
  Audio filter. Pass the source unchanged to the output.
anullsink: |
  Null audio sink. Discards all input audio data.
  Used to consume unwanted audio streams in filtergraphs.
anullsrc: |
  Null audio source. Generates empty audio frames (silence).
  Example: `anullsrc=r=44100:cl=stereo` generates silent stereo audio at 44.1 kHz.
apad: |
  Pad audio with silence. Extends audio duration by appending silence.
  Example: `apad=whole_dur=30000` pads to 30 seconds.
aperms: |
  Audio filter. Set permissions for the output audio frame.
aphasemeter: |
  Audio filter. Convert input audio to phase meter video output.
aphaser: |
  Audio filter. Add a phasing effect to the audio.
aphaseshift: |
  Audio filter. Apply phase shifting to input audio.
apsnr: |
  Audio filter. Measure Audio Peak Signal-to-Noise Ratio.
apsyclip: |
  Audio filter. Audio Psychoacoustic Clipper.
apulsator: |
  Audio filter. Audio pulsator.
arealtime: |
  Slow down audio filtering to match real-time playback speed.
aresample: |
  Resample audio data to a different sample rate.
  Uses libsoxr for high-quality resampling. Example: `aresample=44100` resamples to 44.1 kHz.
areverse: |
  Reverse audio clip. Entire clip must fit in memory.
arls: |
  Audio filter. Apply Recursive Least Squares algorithm to first audio stream.
arnndn: |
  Audio filter. Reduce noise from speech using Recurrent Neural Networks.
asdr: |
  Audio filter. Measure Audio Signal-to-Distortion Ratio.
asegment: |
  Audio filter. Segment audio stream.
aselect: |
  Select audio frames to pass in the output based on an expression.
asendcmd: |
  Audio filter. Send commands to filters.
asetnsamples: |
  Audio filter. Set the number of samples for each output audio frames.
asetpts: |
  Set PTS for audio output frames. Controls audio timing.
  Example: `asetpts=0.5*PTS` doubles playback speed.
asetrate: |
  Audio filter. Change the sample rate without altering the data.
asettb: |
  Audio filter. Set timebase for the audio output link.
ashowinfo: |
  Audio filter. Show textual information for each audio frame.
asidedata: |
  Audio filter. Manipulate audio frame side data.
asisdr: |
  Audio filter. Measure Audio Scale-Invariant Signal-to-Distortion Ratio.
asoftclip: |
  Audio filter. Audio Soft Clipper.
aspectralstats: |
  Audio filter. Show frequency domain statistics about audio frames.
asplit: |
  Pass the audio input to multiple outputs. Audio version of `split`.
  Example: `[0:a]asplit=2[a1][a2]` creates two copies of the audio.
ass: |
  Render ASS subtitles onto input video using the libass library.
  Supports full ASS styling including fonts, colors, and animations.
astats: |
  Audio filter. Show time domain statistics about audio frames.
astreamselect: |
  Media filter. Select audio streams.
asubboost: |
  Audio filter. Boost subwoofer frequencies.
asubcut: |
  Audio filter. Cut subwoofer frequencies.
asupercut: |
  Audio filter. Cut super frequencies.
asuperpass: |
  Audio filter. Apply high order Butterworth band-pass filter.
asuperstop: |
  Audio filter. Apply high order Butterworth band-stop filter.
atadenoise: |
  Adaptive temporal averaging de-noiser. Good quality for moderate noise.
  Slower than hqdn3d but better at preserving detail.
atempo: |
  Adjust audio tempo (speed) without changing pitch.
  Example: `atempo=2.0` doubles speed, `atempo=0.5` halves speed. Range: 0.5–100.
atilt: |
  Audio filter. Apply spectral tilt to audio.
atrim: |
  Select a continuous section of audio by time or sample number.
  Example: `atrim=start=5:end=10` keeps audio from 5s to 10s.
avectorscope: |
  Media filter. Convert input audio to vectorscope video output.
avgblur: |
  Average blur filter. Simple and fast blur.
  Example: `avgblur=5` applies 5px average blur.
avgblur_opencl: |
  Video filter. Apply average blur filter.
avgblur_vulkan: |
  Video filter. Apply avgblur mask to input video.
avsynctest: |
  Media filter. Generate an Audio Video Sync Test.
axcorrelate: |
  Audio filter. Cross-correlate two audio streams.
azmq: |
  Audio filter. Receive commands through ZMQ and broker them to filters.
backgroundkey: |
  Video filter. Turns a static background into transparency.
bandpass: |
  Audio filter. Apply a two-pole Butterworth band-pass filter.
bandreject: |
  Audio filter. Apply a two-pole Butterworth band-reject filter.
bass: |
  Audio filter. Boost or cut lower frequencies.
bbox: |
  Video filter. Compute bounding box for each frame.
bench: |
  Benchmark part of a filtergraph. Measures and reports filter processing time.
bilateral: |
  Video filter. Apply Bilateral filter.
bilateral_cuda: |
  Video filter. GPU accelerated bilateral filter.
biquad: |
  Audio filter. Apply a biquad IIR filter with the given coefficients.
bitplanenoise: |
  Video filter. Measure bit plane noise.
blackdetect: |
  Video filter. Detect video intervals that are (almost) black.
blackdetect_vulkan: |
  Video filter. Detect video intervals that are (almost) black.
blackframe: |
  Video filter. Detect frames that are (almost) black.
blend: |
  Video filter. Blend two video frames into each other.
blend_vulkan: |
  Video filter. Blend two video frames in Vulkan.
blockdetect: |
  Video filter. Blockdetect filter.
blurdetect: |
  Video filter. Blurdetect filter.
bm3d: |
  Block-Matching 3D de-noiser. State-of-the-art denoising quality.
  Very slow but produces excellent results. Good for archival restoration.
boxblur: |
  Box blur filter. Averages pixels within a box area.
  Example: `boxblur=5:1` blurs with 5px radius and 1 pass.
boxblur_opencl: |
  Video filter. Apply boxblur filter to input video.
bs2b: |
  Audio filter. Bauer stereo-to-binaural filter.
buffer: |
  Video source filter. Buffer video frames, and make them accessible to the filterchain.
buffersink: |
  Video sink filter. Buffer video frames, and make them available to the end of the filter graph.
bwdif: |
  Bob Weave Deinterlacing Filter. Improved deinterlacer based on yadif.
  Better quality than yadif with similar performance.
bwdif_cuda: |
  Video filter. Deinterlace CUDA frames.
bwdif_vulkan: |
  Video filter. Deinterlace Vulkan frames via bwdif.
cas: |
  Video filter. Contrast Adaptive Sharpen.
ccrepack: |
  Video filter. Repack CEA-708 closed caption metadata.
cellauto: |
  Video source filter. Create pattern generated by an elementary cellular automaton.
channelmap: |
  Remap audio channels to a different layout.
  Example: `channelmap=1|0|2|3` swaps left and right channels in stereo.
channelsplit: |
  Split audio into per-channel streams. Each output contains one channel.
  Example: `channelsplit=channel_layout=stereo` produces separate left and right streams.
chorus: |
  Audio filter. Add a chorus effect to the audio.
chromaber_vulkan: |
  Video filter. Offset chroma of input video (chromatic aberration).
chromahold: |
  Video filter. Turns a certain color range into gray.
chromakey: |
  Video filter. Turns a certain color into transparency. Operates on YUV colors.
chromakey_cuda: |
  Video filter. GPU accelerated chromakey filter.
chromanr: |
  Video filter. Reduce chrominance noise.
chromashift: |
  Video filter. Shift chroma.
ciescope: |
  Video filter. Video CIE scope.
codecview: |
  Video filter. Visualize information about some codecs.
color: |
  Generate a solid color video source.
  Example: `color=c=red:s=320x240:r=25` generates red 320x240 video at 25 fps.
color_vulkan: |
  Video source filter. Generate a constant color (Vulkan).
colorbalance: |
  Adjust color balance for shadows, midtones, and highlights independently.
  Fine-grained color correction per luminance range.
colorchannelmixer: |
  Video filter. Adjust colors by mixing color channels.
colorchart: |
  Generate color chart video source for test patterns.
colorcontrast: |
  Video filter. Adjust color contrast between RGB components.
colorcorrect: |
  Video filter. Adjust color white balance selectively for blacks and whites.
colordetect: |
  Video filter. Detect video color properties.
colorhold: |
  Video filter. Turns a certain color range into gray. Operates on RGB colors.
colorize: |
  Video filter. Overlay a solid color on the video stream.
colorkey: |
  Video filter. Turns a certain color into transparency. Operates on RGB colors.
colorkey_opencl: |
  Video filter. Turns a certain color into transparency. Operates on RGB colors.
colorlevels: |
  Video filter. Adjust the color levels.
colormap: |
  Media filter. Apply custom Color Maps to video stream.
colormatrix: |
  Video filter. Convert color matrix.
colorspace: |
  Convert between color spaces (BT.601, BT.709, BT.2020, etc.).
  Handles primaries, transfer, and matrix conversions.
colorspace_cuda: |
  Video filter. CUDA accelerated video color converter.
colorspectrum: |
  Video source filter. Generate colors spectrum.
colortemperature: |
  Video filter. Adjust color temperature of video.
compand: |
  Audio filter. Compress or expand audio dynamic range.
compensationdelay: |
  Audio filter. Audio Compensation Delay Line.
concat: |
  Concatenate video/audio streams. Joins them sequentially.
  Example: `[v1][v2]concat=n=2:v=1:a=0` concatenates 2 video streams.
convolution: |
  Video filter. Apply convolution filter.
convolution_opencl: |
  Video filter. Apply convolution mask to input video.
convolve: |
  Video filter. Convolve first video stream with second video stream.
copy: |
  Copy the input video unchanged to the output. Passes frames through without modification.
  Useful for filtering specific streams in a complex filtergraph.
corr: |
  Video filter. Calculate the correlation between two video streams.
cover_rect: |
  Video filter. Find and cover a user specified object.
crop: |
  Crop the input video to the specified dimensions.
  Example: `crop=1280:720:0:0` crops to 1280x720 starting from top-left.
cropdetect: |
  Auto-detect crop size. Determines the optimal crop values to remove black bars.
  Useful as a first pass to find crop values, then apply `crop` in a second pass.
crossfeed: |
  Audio filter. Apply headphone crossfeed filter.
crystalizer: |
  Audio filter. Simple audio noise sharpening filter.
cue: |
  Video filter. Delay filtering to match a cue.
curves: |
  Adjust component curves (like Photoshop curves). Supports custom and preset curves.
  Example: `curves=preset=vintage` or `curves=r=0/0.5:g=0/0.5:b=0/0.5`.
datascope: |
  Video filter. Video data analysis.
dblur: |
  Video filter. Apply Directional Blur filter.
dcshift: |
  Audio filter. Apply a DC shift to the audio.
dctdnoiz: |
  Video filter. Denoise frames using 2D DCT.
deband: |
  Video filter. Debands video.
deblock: |
  Video filter. Deblock video.
decimate: |
  Video filter. Decimate frames (post field matching filter).
deconvolve: |
  Video filter. Deconvolve first video stream with second video stream.
dedot: |
  Video filter. Reduce cross-luminance and cross-color.
deesser: |
  Audio filter. Apply de-essing to the audio.
deflate: |
  Video filter. Apply deflate effect.
deflicker: |
  Video filter. Remove temporal frame luminance variations.
deinterlace_qsv: |
  Intel Quick Sync Video deinterlacing. Hardware-accelerated deinterlace.
  Very fast, low CPU usage on Intel platforms.
deinterlace_vaapi: |
  Video filter. Deinterlacing of VAAPI surfaces.
dejudder: |
  Video filter. Remove judder produced by pullup.
delogo: |
  Remove a TV station logo by interpolating surrounding pixels.
  Example: `delogo=x=0:y=0:w=100:h=77` removes a logo at the top-left.
denoise_vaapi: |
  Video filter. VAAPI VPP for de-noise.
deshake: |
  Video filter. Stabilize shaky video.
deshake_opencl: |
  Video filter. Feature-point based video stabilization filter.
despill: |
  Video filter. Despill video.
detelecine: |
  Video filter. Apply an inverse telecine pattern.
dialoguenhance: |
  Audio filter. Audio Dialogue Enhancement.
dilation: |
  Video filter. Apply dilation effect.
dilation_opencl: |
  Video filter. Apply dilation effect.
displace: |
  Media filter. Displace pixels.
doubleweave: |
  Video filter. Weave input video fields into double number of frames.
drawbox: |
  Draw a colored box on the input video.
  Example: `drawbox=x=10:y=10:w=100:h=100:color=red@0.5`.
drawbox_vaapi: |
  Video filter. Draw a colored box on the input video.
drawgraph: |
  Video filter. Draw a graph using input video metadata.
drawgrid: |
  Draw a colored grid on the input video.
  Example: `drawgrid=w=100:h=100:color=red@0.5`.
drawtext: |
  Draw text on top of video frames using libfreetype. Supports time codes, expressions, and fonts.
  Example: `drawtext=text='%{localtime}':x=10:y=10:fontsize=24:fontcolor=white`.
drmeter: |
  Audio filter. Measure audio dynamic range.
dynaudnorm: |
  Audio filter. Dynamic Audio Normalizer.
earwax: |
  Audio filter. Widen the stereo image.
ebur128: |
  EBU R128 loudness scanner. Measures integrated loudness, loudness range, and true peak.
  Used for broadcast loudness compliance.
edgedetect: |
  Video filter. Detect and draw edge.
elbg: |
  Video filter. Apply posterize effect, using the ELBG algorithm.
entropy: |
  Video filter. Measure video frames entropy.
epx: |
  Video filter. Scale the input using EPX algorithm.
eq: |
  Adjust brightness, contrast, gamma, and saturation.
  Example: `eq=brightness=0.1:contrast=1.5:gamma=0.8`.
equalizer: |
  Audio filter. Apply two-pole peaking equalization (EQ) filter.
erosion: |
  Video filter. Apply erosion effect.
erosion_opencl: |
  Video filter. Apply erosion effect.
estdif: |
  Video filter. Apply Edge Slope Tracing deinterlace.
exposure: |
  Video filter. Adjust exposure of the video stream.
extractplanes: |
  Video filter. Extract planes as grayscale frames.
extrastereo: |
  Audio filter. Increase difference between stereo audio channels.
fade: |
  Fade in/out the video brightness.
  Example: `fade=t=in:st=0:d=5` fades in from black over 5 seconds.
feedback: |
  Media filter. Apply feedback video filter.
fftdnoiz: |
  Video filter. Denoise frames using 3D FFT.
fftfilt: |
  Video filter. Apply arbitrary expressions to pixels in frequency domain.
field: |
  Video filter. Extract a field from the input video.
fieldhint: |
  Video filter. Field matching using hints.
fieldmatch: |
  Video filter. Field matching for inverse telecine.
fieldorder: |
  Video filter. Set the field order.
fillborders: |
  Video filter. Fill borders of the input video.
find_rect: |
  Video filter. Find a user specified object.
firequalizer: |
  Audio filter. Finite Impulse Response Equalizer.
flanger: |
  Audio filter. Apply a flanging effect to the audio.
flip_vulkan: |
  Video filter. Flip both horizontally and vertically.
floodfill: |
  Video filter. Fill area with same color with another color.
format: |
  Convert the input video to the specified pixel format.
  Example: `format=yuv420p` or `format=yuv420p10le`. Essential for codec compatibility.
fps: |
  Force a constant output frame rate. Drops or duplicates frames to achieve the target rate.
  Example: `fps=30` or `fps=24000/1001` (23.976 fps).
framepack: |
  Video filter. Generate a frame packed stereoscopic video.
framerate: |
  Change frame rate with interpolation. Upsamples or downsamples between specified frame rates.
  Higher quality than `fps` filter but slower.
framestep: |
  Video filter. Select one frame every N frames.
freezedetect: |
  Video filter. Detects frozen video input.
freezeframes: |
  Video filter. Freeze video frames.
frei0r: |
  Video filter. Apply a frei0r effect.
frei0r_src: |
  Video source filter. Generate a frei0r source.
fspp: |
  Video filter. Apply Fast Simple Post-processing filter.
fsync: |
  Video filter. Synchronize video frames from external source.
gblur: |
  Gaussian blur filter. Smooths the image with configurable sigma and radius.
  Example: `gblur=sigma=2`.
gblur_vulkan: |
  Video filter. Gaussian Blur in Vulkan.
geq: |
  Video filter. Apply generic equation to each pixel.
gradfun: |
  Video filter. Debands video quickly using gradients.
gradients: |
  Video source filter. Draw a gradients.
graphmonitor: |
  Video filter. Show various filtergraph stats.
grayworld: |
  Video filter. Adjust white balance using LAB gray world algorithm.
greyedge: |
  Video filter. Estimates scene illumination by grey edge assumption.
guided: |
  Video filter. Apply Guided filter.
haas: |
  Audio filter. Apply Haas Stereo Enhancer.
haldclut: |
  Video filter. Adjust colors using a Hald CLUT.
haldclutsrc: |
  Video source filter. Provide an identity Hald CLUT.
hdcd: |
  Audio filter. Apply High Definition Compatible Digital (HDCD) decoding.
headphone: |
  Audio filter. Apply headphone binaural spatialization with HRTFs in additional streams.
hflip: |
  Horizontally flip the input video (mirror image).
  Common for fixing mirrored webcam video.
hflip_vulkan: |
  Video filter. Horizontally flip the input video in Vulkan.
highpass: |
  Audio filter. Apply a high-pass filter with 3dB point frequency.
highshelf: |
  Audio filter. Apply a high shelf filter.
hilbert: |
  Audio source filter. Generate a Hilbert transform FIR coefficients.
histeq: |
  Video filter. Apply global color histogram equalization.
histogram: |
  Video filter. Compute and draw a histogram.
hqdn3d: |
  High quality de-noising using 3D (spatial+temporal) filtering.
