huesaturation: |
  Video filter. Apply hue-saturation-intensity adjustments.
hwdownload: |
  Video filter. Download a hardware frame to a normal frame.
hwmap: |
  Video filter. Map hardware frames.
hwupload: |
  Video filter. Upload a normal frame to a hardware frame.
hwupload_cuda: |
  Video filter. Upload a system memory frame to a CUDA device.
hysteresis: |
  Video filter. Grow first stream into second stream by connecting components.
iccdetect: |
  Video filter. Detect and parse ICC profiles.
iccgen: |
  Video filter. Generate and attach ICC profiles.
identity: |
  Video filter. Calculate the Identity between two video streams.
idet: |
  Video filter. Interlace detect Filter.
il: |
  Video filter. Deinterleave or interleave fields.
inflate: |
  Video filter. Apply inflate effect.
interlace: |
  Video filter. Convert progressive video into interlaced.
interlace_vulkan: |
  Video filter. Convert progressive video into interlaced.
interleave: |
  Temporally interleave video inputs. Alternates frames from each input.
  Example: `interleave=inputs=3` interleaves 3 video sources.
join: |
  Audio filter. Join multiple audio streams into multi-channel output.
kerndeint: |
  Video filter. Apply kernel deinterlacing to the input.
kirsch: |
  Video filter. Apply kirsch operator.
ladspa: |
  Audio filter. Apply LADSPA effect.
lagfun: |
  Video filter. Slowly update darker pixels.
latency: |
  Video filter. Report video filtering latency.
lenscorrection: |
  Video filter. Rectify the image by correcting for lens distortion.
libplacebo: |
  Video filter. Apply various GPU filters from libplacebo.
libvmaf: |
  Video filter. Calculate the VMAF between two video streams.
life: |
  Video source filter. Create life.
limitdiff: |
  Video filter. Apply filtering with limiting difference.
limiter: |
  Video filter. Limit pixels components to the specified range.
loop: |
  Loop video frames a specified number of times.
  Example: `loop=loop=3:size=100:start=0` loops first 100 frames 3 times.
loudnorm: |
  EBU R128 loudness normalization. Normalizes audio to broadcast loudness targets.
