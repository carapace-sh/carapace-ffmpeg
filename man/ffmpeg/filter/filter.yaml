lowpass: |
  Audio filter. Apply a low-pass filter with 3dB point frequency.
lowshelf: |
  Audio filter. Apply a low shelf filter.
lumakey: |
  Video filter. Turns a certain luma into transparency.
lut: |
  Video filter. Compute and apply a lookup table to the RGB/YUV input video.
lut1d: |
  Video filter. Adjust colors using a 1D LUT.
lut2: |
  Video filter. Compute and apply a lookup table from two video inputs.
lut3d: |
  Video filter. Adjust colors using a 3D LUT.
lutrgb: |
  Video filter. Compute and apply a lookup table to the RGB input video.
lutyuv: |
  Video filter. Compute and apply a lookup table to the YUV input video.
mandelbrot: |
  Video source filter. Render a Mandelbrot fractal.
maskedclamp: |
  Media filter. Clamp first stream with second stream and third stream.
maskedmax: |
  Media filter. Apply filtering with maximum difference of two streams.
maskedmerge: |
  Media filter. Merge first stream with second stream using third stream as mask.
maskedmin: |
  Media filter. Apply filtering with minimum difference of two streams.
maskedthreshold: |
  Video filter. Pick pixels comparing absolute difference of two streams with threshold.
maskfun: |
  Video filter. Create Mask.
mcdeint: |
  Video filter. Apply motion compensating deinterlacing.
mcompand: |
  Audio filter. Multiband Compress or expand audio dynamic range.
median: |
  Video filter. Apply Median filter.
mergeplanes: |
  Video filter. Merge planes.
mestimate: |
  Video filter. Generate motion vectors.
metadata: |
  Manipulate frame metadata (display, modify, or delete key-value pairs).
  Example: `metadata=mode=print:file=metadata.txt`.
midequalizer: |
  Video filter. Apply Midway Equalization.
minterpolate: |
  Video filter. Frame rate conversion using Motion Interpolation.
mix: |
  Video filter. Mix video inputs.
monochrome: |
  Video filter. Convert video to gray using custom color filter.
morpho: |
  Video filter. Apply Morphological filter.
movie: |
  Media filter. Read from a movie source.
mpdecimate: |
  Video filter. Remove near-duplicate frames.
mptestsrc: |
  Video source filter. Generate various test pattern.
msad: |
  Video filter. Calculate the MSAD between two video streams.
multiply: |
  Video filter. Multiply first video stream with second video stream.
negate: |
  Video filter. Negate input video.
nlmeans: |
  Non-local means de-noiser. Excellent quality for film grain and moderate noise.
  Slow but produces very clean output. Example: `nlmeans=s=3.0`.
nlmeans_opencl: |
  Video filter. Non-local means denoiser through OpenCL.
nlmeans_vulkan: |
  Video filter. Non-local means denoiser (Vulkan).
nnedi: |
  Video filter. Apply neural network edge directed interpolation intra-only deinterlacer.
noformat: |
  Video filter. Force libavfilter not to use any of the specified pixel formats for the input to the next filter.
noise: |
  Video filter. Add noise.
normalize: |
  Video filter. Normalize RGB video.
null: |
  Video filter. Pass the source unchanged to the output.
nullsink: |
  Null video sink. Discards all input video data.
  Used to consume unwanted video streams in filtergraphs.
nullsrc: |
  Null video source. Generates empty video frames (black).
  Example: `nullsrc=s=256x256:r=25` generates 256x256 black video at 25 fps.
openclsrc: |
  Video source filter. Generate video using an OpenCL program.
oscilloscope: |
  Video filter. 2D Video Oscilloscope.
overlay: |
  Overlay one video on top of another. The primary filter for compositing.
  Example: `overlay=10:20` places the overlay at x=10, y=20 on the main video.
overlay_cuda: |
  Video filter. Overlay one video on top of another using CUDA.
overlay_opencl: |
  Video filter. Overlay one video on top of another.
overlay_qsv: |
  Video filter. Quick Sync Video overlay.
overlay_vaapi: |
  Video filter. Overlay one video on top of another.
overlay_vulkan: |
  Video filter. Overlay a source on top of another.
owdenoise: |
  Video filter. Denoise using wavelets.
pad: |
  Pad the input video to the specified size, adding colored borders.
  Example: `pad=1920:1080:(ow-iw)/2:(oh-ih)/2` centers the input in a 1920x1080 canvas.
pad_cuda: |
  Video filter. CUDA-based GPU padding filter.
pad_opencl: |
  Video filter. Pad the input video.
pad_vaapi: |
  Video filter. Pad the input video.
pal100bars: |
  Video source filter. Generate PAL 100% color bars.
pal75bars: |
  Video source filter. Generate PAL 75% color bars.
palettegen: |
  Video filter. Find the optimal palette for a given stream.
paletteuse: |
  Video filter. Use a palette to downsample an input video stream.
pan: |
  Remix audio channels with custom coefficients (panning).
  Example: `pan=stereo|FL=FL+0.5*FC|FR=FR+0.5*FC` mixes center into front channels.
perlin: |
  Video source filter. Generate Perlin noise.
perms: |
  Video filter. Set permissions for the output video frame.
perspective: |
  Video filter. Correct the perspective of video.
phase: |
  Video filter. Phase shift fields.
photosensitivity: |
  Video filter. Filter out photosensitive epilepsy seizure-inducing flashes.
pixdesctest: |
  Video filter. Test pixel format definitions.
pixelize: |
  Video filter. Pixelize video.
pixscope: |
  Video filter. Pixel data analysis.
pp7: |
  Video filter. Apply Postprocessing 7 filter.
premultiply: |
  Video filter. PreMultiply first stream with first plane of second stream.
premultiply_dynamic: |
  Video filter. Premultiply or unpremultiply an image in-place, as needed.
prewitt: |
  Video filter. Apply prewitt operator.
prewitt_opencl: |
  Video filter. Apply prewitt operator.
procamp_vaapi: |
  Video filter. ProcAmp (color balance) adjustments for hue, saturation, brightness, contrast.
program_opencl: |
  Video filter. Filter video using an OpenCL program.
pseudocolor: |
  Video filter. Make pseudocolored video frames.
psnr: |
  Video filter. Calculate the PSNR between two video streams.
pullup: |
  Video filter. Pullup from field sequence to frames.
qp: |
  Video filter. Change video quantization parameters.
random: |
  Video filter. Return random frames.
readeia608: |
  Video filter. Read EIA-608 Closed Caption codes from input video and write them to frame metadata.
readvitc: |
  Video filter. Read vertical interval timecode and write it to frame metadata.
realtime: |
  Slow down filtering to match real-time playback speed.
  Useful when output needs to be processed at original speed (e.g., streaming).
remap: |
  Media filter. Remap pixels.
remap_opencl: |
  Media filter. Remap pixels using OpenCL.
removegrain: |
  Video filter. Remove grain.
removelogo: |
  Video filter. Remove a TV logo based on a mask image.
repeatfields: |
  Video filter. Hard repeat fields based on MPEG repeat field flag.
replaygain: |
  Audio filter. ReplayGain scanner.
reverse: |
  Reverse video clip. Entire clip must fit in memory.
  Example: `reverse` reverses the entire video.
rgbashift: |
  Video filter. Shift RGBA.
rgbtestsrc: |
  Video source filter. Generate RGB test pattern.
roberts: |
  Video filter. Apply roberts cross operator.
roberts_opencl: |
  Video filter. Apply roberts operator.
rotate: |
  Rotate the video by an arbitrary angle. Can also adjust the output size.
  Example: `rotate=PI/2` rotates 90° clockwise.
rubberband: |
  Audio filter. Apply time-stretching and pitch-shifting.
sab: |
  Video filter. Apply shape adaptive blur.
scale: |
  Scale (resize) the input video. The most commonly used video filter.
  Width and height can be set in pixels, or use `iw/2`, `ow/dar`, and other expressions.
  Example: `scale=1280:720` or `scale=1920:-2` (preserve aspect ratio with even height).
scale2ref: |
  Media filter. Scale the input video size and/or convert the image format to the given reference.
scale_cuda: |
  Video filter. GPU accelerated video resizer.
scale_qsv: |
  Video filter. Quick Sync Video "scaling and format conversion".
scale_vaapi: |
  Video filter. Scale to/from VAAPI surfaces.
scale_vulkan: |
  Video filter. Scale Vulkan frames.
scdet: |
  Video filter. Detect video scene change.
scdet_vulkan: |
  Video filter. Detect video scene change.
scharr: |
  Video filter. Apply scharr operator.
scroll: |
  Video filter. Scroll input video.
segment: |
  Video filter. Segment video stream.
select: |
  Select frames to pass in the output based on an expression.
  Example: `select='eq(n,0)+eq(n,100)'` passes only frames 0 and 100.
selectivecolor: |
  Video filter. Apply CMYK adjustments to specific color ranges.
sendcmd: |
  Video filter. Send commands to filters.
separatefields: |
  Video filter. Split input video frames into fields.
setdar: |
  Set the Display Aspect Ratio (DAR) of the video. Changes metadata without resampling.
  Common values: `16:9` (widescreen), `4:3` (standard).
setfield: |
  Video filter. Force field for the output video frame.
setparams: |
  Video filter. Force field, or color property for the output video frame.
setpts: |
  Set presentation timestamp (PTS) for output frames. Controls timing and speed.
  Example: `setpts=0.5*PTS` doubles speed, `setpts=2*PTS` halves speed.
setrange: |
  Video filter. Force color range for the output video frame.
setsar: |
  Set the Sample Aspect Ratio (SAR) of the video. Changes metadata without resampling.
  Common values: `1:1` (square pixels), `16:11` (NTSC), `64:45` (PAL).
settb: |
  Video filter. Set timebase for the video output link.
sharpness_vaapi: |
  Video filter. VAAPI VPP for sharpness.
shear: |
  Video filter. Shear transform the input image.
showcqt: |
  Media filter. Convert input audio to a CQT (Constant/Clamped Q Transform) spectrum video output.
showcwt: |
  Media filter. Convert input audio to a CWT (Continuous Wavelet Transform) spectrum video output.
showfreqs: |
  Media filter. Convert input audio to a frequencies video output.
showinfo: |
  Video filter. Show textual information for each video frame.
showpalette: |
  Video filter. Display frame palette.
showspatial: |
  Media filter. Convert input audio to a spatial video output.
showspectrum: |
  Media filter. Convert input audio to a spectrum video output.
showspectrumpic: |
  Media filter. Convert input audio to a spectrum video output single picture.
showvolume: |
  Media filter. Convert input audio volume to video output.
showwaves: |
  Media filter. Convert input audio to a video output.
showwavespic: |
  Media filter. Convert input audio to a video output single picture.
shuffleframes: |
  Video filter. Shuffle video frames.
shufflepixels: |
  Video filter. Shuffle video pixels.
shuffleplanes: |
  Video filter. Shuffle video planes.
sidechaincompress: |
  Audio filter. Sidechain compressor.
sidechaingate: |
  Audio filter. Audio sidechain gate.
sidedata: |
  Video filter. Manipulate video frame side data.
sierpinski: |
  Video source filter. Render a Sierpinski fractal.
signalstats: |
  Video filter. Generate statistics from video analysis.
signature: |
  Video filter. Calculate the MPEG-7 video signature.
silencedetect: |
  Detect silence in an audio stream. Outputs silence start/end timestamps.
  Example: `silencedetect=n=-50dB:d=2` detects silence below -50 dB for 2+ seconds.
silenceremove: |
  Audio filter. Remove silence.
sinc: |
  Audio source filter. Generate a sinc kaiser-windowed low-pass, high-pass, band-pass, or band-reject FIR coefficients.
sine: |
  Generate sine wave audio signal. Simpler interface than `sin`.
  Example: `sine=frequency=1000:duration=5`.
siti: |
  Video filter. Calculate spatial information (SI) and temporal information (TI).
smartblur: |
  Video filter. Blur the input video without impacting the outlines.
smptebars: |
  Generate SMPTE color bars test pattern.
  Standard video test signal for calibration and alignment.
smptehdbars: |
  Video source filter. Generate SMPTE HD color bars.
sobel: |
  Video filter. Apply sobel operator.
sobel_opencl: |
  Video filter. Apply sobel operator.
spectrumsynth: |
  Media filter. Convert input spectrum videos to audio output.
speechnorm: |
  Speech normalizer. Levels volume for speech content.
  Good for podcasts and interviews with varying speaker volumes.
split: |
  Pass the input video to multiple outputs. Used to apply different filters to the same source.
  Example: `[0:v]split=2[v1][v2]` creates two copies of the input.
spp: |
  Video filter. Apply a simple post processing filter.
sr_amf: |
  Video filter. AMF HQ video upscaling.
ssim: |
  Video filter. Calculate the SSIM between two video streams.
ssim360: |
  Video filter. Calculate the SSIM between two 360 video streams.
stereo3d: |
  Video filter. Convert video stereoscopic 3D view.
stereotools: |
  Audio filter. Apply various stereo tools.
stereowiden: |
  Audio filter. Apply stereo widening effect.
streamselect: |
  Media filter. Select video streams.
subtitles: |
  Video filter. Render text subtitles onto input video using the libass library.
super2xsai: |
  Video filter. Scale the input by 2x using the Super2xSaI pixel art algorithm.
superequalizer: |
  Audio filter. Apply 18 band equalization filter.
surround: |
  Audio filter. Apply audio surround upmix filter.
swaprect: |
  Video filter. Swap 2 rectangular objects in video.
swapuv: |
  Video filter. Swap U and V components.
tblend: |
  Video filter. Blend successive frames.
telecine: |
  Video filter. Apply a telecine pattern.
testsrc: |
  Video source filter. Generate test pattern.
testsrc2: |
  Video source filter. Generate another test pattern.
thistogram: |
  Video filter. Compute and draw a temporal histogram.
threshold: |
  Media filter. Threshold first video stream using other video streams.
thumbnail: |
  Video filter. Select the most representative frame in a given sequence of consecutive frames.
thumbnail_cuda: |
  Video filter. Select the most representative frame in a given sequence of consecutive frames using CUDA.
tile: |
  Video filter. Tile several successive frames together.
tiltandshift: |
  Video filter. Generate a tilt-and-shift'd video.
tiltshelf: |
  Audio filter. Apply a tilt shelf filter.
tinterlace: |
  Video filter. Perform temporal field interlacing.
tlut2: |
  Video filter. Compute and apply a lookup table from two successive frames.
tmedian: |
  Video filter. Pick median pixels from successive frames.
tmidequalizer: |
  Video filter. Apply Temporal Midway Equalization.
tmix: |
  Video filter. Mix successive video frames.
tonemap: |
  Video filter. Conversion to/from different dynamic ranges.
tonemap_opencl: |
  Video filter. Perform HDR to SDR conversion with tonemapping.
tonemap_vaapi: |
  Video filter. VAAPI VPP for tone-mapping.
tpad: |
  Video filter. Temporarily pad video frames.
transpose: |
  Transpose (rotate 90°) the video. Direction: 0=CCW+vertical flip, 1=90° CW, 2=90° CCW, 3=CW+vertical flip.
  Example: `transpose=1` rotates 90° clockwise.
transpose_opencl: |
  Video filter. Transpose input video.
transpose_vaapi: |
  Video filter. VAAPI VPP for transpose.
transpose_vulkan: |
  Video filter. Transpose Vulkan Filter.
treble: |
  Audio filter. Boost or cut upper frequencies.
tremolo: |
  Audio filter. Apply tremolo effect.
trim: |
  Select a continuous section of the input by time or frame number.
  Example: `trim=start=5:end=10` keeps frames from 5s to 10s.
unpremultiply: |
  Video filter. UnPreMultiply first stream with first plane of second stream.
unsharp: |
  Sharpen or blur the video using unsharp mask filter.
  Example: `unsharp=5:5:1.5` sharpens with 5x5 kernel and 1.5 strength.
unsharp_opencl: |
  Video filter. Apply unsharp mask to input video.
untile: |
  Video filter. Untile a frame into a sequence of frames.
uspp: |
  Video filter. Apply Ultra Simple / Slow Post-processing filter.
v360: |
  Video filter. Convert 360 projection of video.
vaguedenoiser: |
  Video filter. Apply a Wavelet based Denoiser.
varblur: |
  Video filter. Apply Variable Blur filter.
vectorscope: |
  Video filter. Video vectorscope.
vflip: |
  Vertically flip the input video (upside down).
vflip_vulkan: |
  Video filter. Vertically flip the input video in Vulkan.
vfrdet: |
  Video filter. Variable frame rate detect filter.
vibrance: |
  Video filter. Boost or alter saturation.
vibrato: |
  Audio filter. Apply vibrato effect.
vidstabdetect: |
  Video filter. Extract relative transformations, pass 1 of 2 for stabilization (see vidstabtransform for pass 2).
vidstabtransform: |
  Video filter. Transform the frames, pass 2 of 2 for stabilization (see vidstabdetect for pass 1).
vif: |
  Video filter. Calculate the VIF between two video streams.
vignette: |
  Video filter. Make or reverse a vignette effect.
virtualbass: |
  Audio filter. Audio Virtual Bass.
vmafmotion: |
  Video filter. Calculate the VMAF Motion score.
volume: |
  Change input audio volume. Supports linear multiplier, decibels, and expressions.
  Example: `volume=2.0` (double), `volume=3dB` (increase by 3 dB), `volume=0.5` (halve).
volumedetect: |
  Detect audio volume levels. Reports mean, max volume, and histogram.
  Use for normalization planning: `volumedetect` then apply `volume`.
vpp_amf: |
  Video filter. AMF video scaling and format conversion.
vpp_qsv: |
  Video filter. Quick Sync Video "VPP".
vsrc_amf: |
  Video source filter. AMD AMF screen capture.
vstack: |
  Stack video inputs vertically (top and bottom).
  All inputs must have the same width. Example: `[v1][v2]vstack=inputs=2`.
vstack_qsv: |
  Video filter. "Quick Sync Video" vstack.
vstack_vaapi: |
  Video filter. "VA-API" vstack.
w3fdif: |
  Weston 3-Field Deinterlacing Filter. BBC-developed deinterlacer.
  Good quality with moderate performance. Supports simple and complex modes.
waveform: |
  Video filter. Video waveform monitor.
weave: |
  Video filter. Weave input video fields into frames.
xbr: |
  Video filter. Scale the input using xBR algorithm.
xcorrelate: |
  Video filter. Cross-correlate first video stream with second video stream.
xfade: |
  Video filter. Cross fade one video with another video.
xfade_opencl: |
  Video filter. Cross fade one video with another video.
xfade_vulkan: |
  Video filter. Cross fade one video with another video.
xmedian: |
  Video filter. Pick median pixels from several video inputs.
xpsnr: |
  Video filter. Calculate the extended perceptually weighted peak signal-to-noise ratio (XPSNR) between two video streams.
xstack: |
  Stack video inputs in a custom grid layout.
  Example: `xstack=inputs=4:layout=0_0|w0_0|0_h0|w0_h0` creates a 2x2 grid.
xstack_qsv: |
  Video filter. "Quick Sync Video" xstack.
xstack_vaapi: |
  Video filter. "VA-API" xstack.
yadif: |
  Yet Another Deinterlacing Filter. Standard deinterlacer with spatial and temporal modes.
  Example: `yadif=0` (temporal, default), `yadif=1` (temporal and spatial).
yadif_cuda: |
  Video filter. Deinterlace CUDA frames.
yaepblur: |
  Video filter. Yet another edge preserving blur filter.
yuvtestsrc: |
  Video source filter. Generate YUV test pattern.
zmq: |
  Video filter. Receive commands through ZMQ and broker them to filters.
zoneplate: |
  Video source filter. Generate zone-plate.
zoompan: |
  Video filter. Apply Zoom & Pan effect.
zscale: |
  Video filter. Apply resizing, colorspace and bit depth conversion.
